                                                    <td className="px-6 py-4 text-slate-500 font-mono text-xs">{u.id}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider shadow-sm ${u.rol === 'admin' ? 'bg-red-500 text-white' : u.rol === 'gerente' ? 'bg-purple-500 text-white' : 'bg-blue-100 text-blue-700'}`}>
                                                            {u.rol}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 flex justify-end gap-3">
                                                        <button onClick={() => handleEditClick(u)} className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-600 hover:text-white rounded-lg transition-colors shadow-sm" title="Editar Usuario"><Edit2 size={16} /></button>
                                                        <button onClick={() => openModal('deleteUser', u.id, 'Eliminar Usuario', `¿Estás seguro de que deseas eliminar permanentemente a ${u.nombre}? Perderá inmediatamente el acceso al sistema.`)} className="p-2 text-red-600 bg-red-50 hover:bg-red-600 hover:text-white rounded-lg transition-colors shadow-sm disabled:opacity-30 disabled:hover:bg-red-50 disabled:hover:text-red-600" disabled={u.id === 'admin1'} title="Eliminar Usuario"><Trash2 size={16} /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- PESTAÑA 4: CARTERA DE CLIENTES --- */}
                    {activeTab === 'cartera' && (
                        <div className="space-y-6 animate-fadeIn">
                            <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 border-b border-slate-100 pb-6">
                                    <div>
                                        <h2 className="text-xl font-black text-blue-900 flex items-center gap-3 mb-1"><BookOpen className="text-orange-500" /> Asignación de Rutas y Cartera</h2>
                                        <p className="text-slate-500 text-sm font-medium">Carga la base de datos de clientes para enlazarlos con sus vendedores.</p>
                                    </div>
                                    <button
                                        onClick={() => openModal('clearCartera', null, 'Vaciar Cartera Completa', '¡ATENCIÓN! ¿Estás absolutamente seguro de que deseas eliminar TODOS los clientes cargados? Esto vaciará la ruta de todos los vendedores de forma irreversible.')}
                                        className="px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all bg-red-50 text-red-600 hover:bg-red-600 hover:text-white shadow-sm hover:shadow-md"
                                        title="Borrar todos los clientes cargados"
                                    >
                                        <Trash2 size={18} /> Limpiar Toda la Cartera
                                    </button>
                                </div>

                                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center hover:bg-blue-50/50 hover:border-blue-300 transition-all mb-8">
                                    <input type="file" ref={carteraInputRef} onChange={handleCarteraFileSelect} accept=".xlsx, .xls, .csv" className="hidden" />
                                    <Upload className="mx-auto h-16 w-16 text-slate-400 mb-4" />
                                    <h3 className="text-base font-bold text-slate-700 mb-2">Selecciona tu archivo Excel (.xlsx)</h3>
                                    <p className="text-xs text-slate-500 mb-5">El archivo debe contener las columnas "Vendedor" y "Cliente".</p>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        <button onClick={handleDownloadPlantillaCartera} className="bg-white border-2 border-blue-200 text-blue-700 hover:border-blue-300 hover:bg-blue-50 px-6 py-2.5 rounded-xl font-bold transition-all shadow-sm flex items-center gap-2">
                                            <Download size={18} /> Descargar Plantilla
                                        </button>
                                        <button onClick={handleCarteraUploadClick} disabled={carteraUploadStatus === 'uploading'} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-8 py-2.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 flex items-center gap-2">
                                            {carteraUploadStatus === 'uploading' ? <div className="w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <Upload size={18} />}
                                            Subir Excel de Rutas
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                                <div className="bg-slate-50 p-5 border-b border-slate-100 flex flex-wrap gap-4 items-center">
                                    <div className="text-sm font-black text-slate-700 flex items-center gap-2 w-full md:w-auto uppercase tracking-wider">
                                        <Search size={18} className="text-blue-600" /> Búsqueda:
                                    </div>
                                    <div className="flex-1 min-w-[250px] relative">
                                        <input
                                            type="text"
                                            placeholder="Buscar cliente, nombre de vendedor o código..."
                                            value={adminSearchCartera}
                                            onChange={e => setAdminSearchCartera(e.target.value)}
                                            className="w-full pl-4 pr-10 py-3 border-2 border-slate-200 hover:border-blue-300 focus:border-blue-500 rounded-xl text-sm outline-none bg-white transition-colors font-medium text-slate-700"
                                        />
                                        {adminSearchCartera && (
                                            <button onClick={() => setAdminSearchCartera('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 transition-colors p-1"><X size={16} /></button>
                                        )}
                                    </div>
                                    <div className="text-xs font-bold text-slate-500 bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm">
                                        Mostrando: <span className="text-blue-600">{filteredCarteraAdmin.length}</span> clientes
                                    </div>
                                </div>

                                <div className="overflow-x-auto max-h-[600px]">
                                    <table className="w-full text-sm text-left relative">
                                        <thead className="bg-white text-slate-400 text-[10px] uppercase font-black tracking-wider sticky top-0 shadow-sm z-10">
                                            <tr>
                                                <th className="px-6 py-4">Vendedor Responsable</th>
                                                <th className="px-6 py-4">Nombre del Cliente</th>
                                                <th className="px-6 py-4 text-right">Opciones</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {filteredCarteraAdmin.map((c) => {
                                                const isEditing = editingCarteraIndex === c.firebaseId;
                                                return (
                                                    <tr key={c.firebaseId} className="hover:bg-blue-50/30 transition-colors">
                                                        <td className="px-6 py-4 font-bold text-slate-700">
                                                            {isEditing ? (
                                                                <select
                                                                    value={editCarteraVendedorId}
                                                                    onChange={(e) => setEditCarteraVendedorId(e.target.value)}
                                                                    className="border-2 border-blue-300 rounded-lg p-2 text-sm w-full max-w-[300px] outline-none focus:border-blue-600 bg-white shadow-sm"
                                                                >
                                                                    {listVendedores.map(v => (
                                                                        <option key={v.id} value={v.id}>{v.id} - {v.nombre}</option>
                                                                    ))}
                                                                </select>
                                                            ) : (
                                                                <div className="flex items-center gap-3">
                                                                    <div className="w-7 h-7 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-[10px] font-black">{c.idVendedor}</div>
                                                                    {c.vendedorNombre}
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="px-6 py-4 text-slate-600 font-medium">{c.cliente}</td>
                                                        <td className="px-6 py-4 text-right">
                                                            <div className="flex justify-end gap-2">
                                                                {isEditing ? (
                                                                    <>
                                                                        <button onClick={() => handleSaveClienteCartera(c.firebaseId)} className="p-2 bg-green-500 text-white hover:bg-green-600 rounded-lg transition-all shadow-sm" title="Confirmar Cambio"><Save size={16} /></button>
                                                                        <button onClick={() => setEditingCarteraIndex(null)} className="p-2 bg-slate-200 text-slate-600 hover:bg-slate-300 rounded-lg transition-colors" title="Cancelar"><X size={16} /></button>
                                                                    </>
                                                                ) : (
                                                                    <>
                                                                        <button onClick={() => handleEditClienteCartera(c.firebaseId, c.idVendedor)} className="p-2 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white rounded-lg transition-colors shadow-sm" title="Cambiar a otro vendedor"><Edit2 size={16} /></button>
                                                                        <button onClick={() => openModal('deleteClienteCartera', c.firebaseId, 'Eliminar Cliente de la Ruta', `¿Estás seguro de que deseas desvincular a "${c.cliente}" de la ruta de este vendedor?`)} className="p-2 bg-red-50 text-red-500 hover:bg-red-600 hover:text-white rounded-lg transition-colors shadow-sm" title="Eliminar Cliente"><Trash2 size={16} /></button>
                                                                    </>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                    {filteredCarteraAdmin.length === 0 && (
                                        <div className="p-16 text-center text-slate-400 font-medium flex flex-col items-center">
                                            <BookOpen size={40} className="mb-4 text-slate-200" />
                                            {adminSearchCartera ? "No se encontraron resultados para la búsqueda." : "Aún no hay clientes en la cartera."}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- PESTAÑA 5: CONFIGURACIÓN IA --- */}
                    {activeTab === 'config' && (
                        <div className="space-y-6 animate-fadeIn">
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 max-w-3xl mx-auto">
                                <div className="flex items-center gap-4 mb-6 border-b border-slate-100 pb-6">
                                    <div className="p-4 bg-orange-100 text-orange-600 rounded-2xl"><Key size={32} /></div>
                                    <div>
                                        <h2 className="text-2xl font-black text-blue-900">Configuración de Inteligencia Artificial</h2>
                                        <p className="text-slate-500 font-medium">Vincula el sistema con Google Gemini para obtener análisis predictivos.</p>
                                    </div>
                                </div>

                                {!configUnlocked ? (
                                    <div className="flex flex-col items-center justify-center p-8 bg-slate-50 rounded-2xl border border-slate-200">
                                        <Lock size={48} className="text-slate-400 mb-4" />
                                        <h3 className="text-lg font-bold text-slate-700 mb-2">Área Restringida</h3>
                                        <p className="text-sm text-slate-500 mb-6 text-center">Introduce la clave de seguridad para modificar la API de la IA.</p>
                                        <div className="flex w-full max-w-xs gap-2">
                                            <input
                                                type="password"
                                                placeholder="Contraseña..."
                                                value={configPassword}
                                                onChange={(e) => { setConfigPassword(e.target.value); setConfigError(""); }}
                                                className="flex-1 border-2 border-slate-200 focus:border-blue-600 rounded-xl p-3 outline-none text-center font-bold"
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter') {
                                                        if (configPassword === '1882') setConfigUnlocked(true);
                                                        else setConfigError("Clave incorrecta");
                                                    }
                                                }}
                                            />
                                            <button
                                                onClick={() => {
                                                    if (configPassword === '1882') setConfigUnlocked(true);
                                                    else setConfigError("Clave incorrecta");
                                                }}
                                                className="bg-blue-600 text-white px-6 font-bold rounded-xl hover:bg-blue-700 transition-colors"
                                            >
                                                Verificar
                                            </button>
                                        </div>
                                        {configError && <p className="text-red-500 text-xs font-bold mt-3">{configError}</p>}
                                    </div>
                                ) : (
                                    <form onSubmit={handleSaveApiConfig} className="space-y-6 animate-fadeIn">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">Clave de API (Gemini API Key)</label>
                                            <input
                                                type="text"
                                                value={localApiKey}
                                                onChange={e => setLocalApiKey(e.target.value)}
                                                placeholder="Pega tu API Key generada en Google AI Studio..."
                                                className="w-full border-2 border-slate-200 focus:border-blue-600 rounded-xl p-4 outline-none transition-all font-mono text-sm bg-slate-50 focus:bg-white"
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">Modelo de Inteligencia Artificial (Auto-Seleccionable)</label>
                                            <div className="flex flex-col sm:flex-row gap-3 mb-2">
                                                <select
                                                    value={localModel}
                                                    onChange={e => setLocalModel(e.target.value)}
                                                    className="flex-1 border-2 border-slate-200 focus:border-blue-600 rounded-xl p-3 outline-none transition-all font-medium text-sm bg-slate-50 focus:bg-white cursor-pointer"
                                                >
                                                    {availableModels.map(m => (
                                                        <option key={m} value={m}>{m}</option>
                                                    ))}
                                                </select>
                                                <button
                                                    type="button"
                                                    onClick={testAndFetchModels}
                                                    disabled={savingConfig}
                                                    className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-5 py-3 rounded-xl font-bold text-sm transition-colors shadow-sm flex items-center justify-center gap-2 whitespace-nowrap"
                                                >
                                                    <Sparkles size={16} className="text-orange-500" />
                                                    Probar y Buscar Modelos
                                                </button>
                                            </div>
                                            <p className="text-xs text-slate-500 flex items-start gap-1.5 mt-2">
                                                <AlertCircle size={14} className="text-blue-500 shrink-0 mt-0.5" />
                                                <span>Haz clic en "Probar y Buscar Modelos" después de pegar tu API Key para que el sistema busque y cargue automáticamente en la lista solo los modelos que tu clave tiene permitidos utilizar.</span>
                                            </p>
                                            {configError && <p className="text-red-500 text-xs font-bold mt-2">{configError}</p>}
                                        </div>

                                        <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                                            <button
                                                type="button"
                                                onClick={() => { setConfigUnlocked(false); setConfigPassword(""); }}
                                                className="text-slate-500 hover:text-slate-700 font-bold text-sm transition-colors"
                                            >
                                                Volver y Bloquear
                                            </button>
                                            <button
                                                type="submit"
                                                disabled={savingConfig}
                                                className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all shadow-md"
                                            >
                                                {savingConfig ? <div className="w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <Save size={18} />}
                                                Guardar Configuración
                                            </button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        // --- COMPONENTE AGREGADO PARA EVITAR ERRORES DE RENDERIZADO ---
        const GerenteDashboard = ({ userId, users, sales, cartera, cxc }) => {
            const [expandedVendedorMeta, setExpandedVendedorMeta] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [expandedClienteCxc, setExpandedClienteCxc] = useState(null);
            const [selectedVendedorCartera, setSelectedVendedorCartera] = useState('');
            const [searchCliente, setSearchCliente] = useState('');
            
            const currentMonthStr = useMemo(() => {
                const cmSales = sales.filter(s => s.source === 'currMonth');
                return getLatestMonthStr(cmSales.length > 0 ? cmSales : sales);
            }, [sales]);

            const myTeam = useMemo(() => users.filter(u => u.rol === 'vendedor' && u.supervisor === userId), [users, userId]);
            const myTeamIds = useMemo(() => myTeam.map(u => normalizeId(u.id)), [myTeam]);

            const teamCxc = useMemo(() => {
                if (!cxc || !cartera) return [];
                const teamCartera = cartera.filter(c => myTeamIds.includes(normalizeId(c.idVendedor)) || (c.vendedorNombre && myTeam.some(u => c.vendedorNombre.includes(u.id))));
                
                const filteredCxc = cxc.filter(d => 
                    teamCartera.some(c => 
                        d.rawCliente === c.cliente || 
                        d.clienteNombre === c.cliente || 
                        (d.idCliente && c.cliente.includes(d.idCliente)) ||
                        (d.rawCliente && d.rawCliente.includes(c.cliente))
                    )
                );
                return filteredCxc.sort((a, b) => b.deuda - a.deuda);
            }, [cxc, cartera, myTeam, myTeamIds]);

            const carteraStats = useMemo(() => {
                if (!cartera) return { total: 0, activos: 0, inactivos: 0, cobertura: 0, clientes: [] };
                
                let filteredCartera = cartera;
                if (selectedVendedorCartera) {
                    filteredCartera = cartera.filter(c => 
                        normalizeId(c.idVendedor) === normalizeId(selectedVendedorCartera) || 
                        (c.vendedorNombre && c.vendedorNombre.includes(selectedVendedorCartera))
                    );
                } else {
                    filteredCartera = cartera.filter(c => myTeamIds.includes(normalizeId(c.idVendedor)) || (c.vendedorNombre && myTeam.some(u => c.vendedorNombre.includes(u.id))));
                }

                if (searchCliente) {
                    const searchLower = searchCliente.toLowerCase();
                    filteredCartera = filteredCartera.filter(c => 
                        (c.cliente && c.cliente.toLowerCase().includes(searchLower)) || 
                        (c.idCliente && c.idCliente.toLowerCase().includes(searchLower))
                    );
                }

                const currentSales = sales.filter(s =>
                    (s.source === 'currMonth' || (!s.source && s.fecha && String(s.fecha).startsWith(currentMonthStr)))
                );

                const clientsProcessed = filteredCartera.map(c => {
                    const compras = currentSales.filter(s => 
                        s.idCliente === c.idCliente || 
                        s.cliente === c.cliente || 
                        (s.rawCliente && s.rawCliente === c.cliente)
                    );
                    
                    const montoTotal = compras.reduce((sum, s) => sum + s.monto, 0);
                    const lastCompra = compras.length > 0 ? compras.sort((a,b) => new Date(b.fecha) - new Date(a.fecha))[0].fecha : null;
                    
                    return {
                        ...c,
                        status: montoTotal > 0 ? 'Activo' : 'Inactivo',
                        montoMes: montoTotal,
                        ultimaCompra: lastCompra
                    };
                });

                const total = clientsProcessed.length;
                const activos = clientsProcessed.filter(c => c.status === 'Activo').length;
                const inactivos = total - activos;
                const cobertura = total > 0 ? (activos / total) * 100 : 0;

                return { total, activos, inactivos, cobertura, clientes: clientsProcessed };
            }, [cartera, selectedVendedorCartera, searchCliente, sales, currentMonthStr, myTeamIds, myTeam]);

            const teamStats = useMemo(() => {
                const currentSales = sales.filter(s =>
                    (s.source === 'currMonth' || (!s.source && s.fecha && String(s.fecha).startsWith(currentMonthStr))) &&
                    (myTeamIds.includes(normalizeId(s.idVendedor)))
                );

                let totalMonto = 0; let totalUnidades = 0; let totalCajas = 0;
                const vendedoresMap = {}; const clientesUnicos = new Set();
                const productosUnicos = new Set(); const facturasUnicas = new Set();

                myTeam.forEach(u => {
                    const normId = normalizeId(u.id);
                    vendedoresMap[normId] = {
                        id: u.id,
                        nombre: u.nombre,
                        monto: 0,
                        unidades: 0,
                        cajas: 0,
                        metaMonto: Number(u.metas?.monto) || 0,
                        metaCajas: Number(u.metas?.cajas) || 0,
                        metaUnidades: Number(u.metas?.unidades) || 0,
                        metaGrupos: u.metas?.grupos || {},
                        logradoGrupos: {},
                        metaSubgrupos: u.metas?.subgrupos || {},
                        logradoSubgrupos: {},
                        hasAnyMeta: (Number(u.metas?.monto) > 0 || Number(u.metas?.cajas) > 0 || Number(u.metas?.unidades) > 0 || (u.metas?.grupos && Object.keys(u.metas?.grupos).length > 0) || (u.metas?.subgrupos && Object.keys(u.metas?.subgrupos).length > 0))
                    };
                });

                currentSales.forEach(sale => {
                    totalMonto += sale.monto; totalUnidades += sale.unidades; totalCajas += sale.cajas || 0;
                    if (sale.monto > 0) { clientesUnicos.add(sale.idCliente); productosUnicos.add(sale.articulo); }
                    if (sale.numero && sale.tipoDoc !== 'DV') facturasUnicas.add(sale.numero);

                    const vIdNorm = normalizeId(sale.idVendedor);
                    if (vendedoresMap[vIdNorm]) {
                        vendedoresMap[vIdNorm].monto += sale.monto;
                        vendedoresMap[vIdNorm].unidades += sale.unidades;
                        vendedoresMap[vIdNorm].cajas += sale.cajas || 0;
                        
                        const grupo = sale.grupo || 'GENERAL';
                        if (!vendedoresMap[vIdNorm].logradoGrupos[grupo]) {
                            vendedoresMap[vIdNorm].logradoGrupos[grupo] = { monto: 0, cajas: 0 };
                        }
                        vendedoresMap[vIdNorm].logradoGrupos[grupo].monto += sale.monto;
                        vendedoresMap[vIdNorm].logradoGrupos[grupo].cajas += (sale.cajas || 0);

                        const subgrupo = sale.subgrupo || 'SIN SUBGRUPO';
                        if (!vendedoresMap[vIdNorm].logradoSubgrupos[subgrupo]) {
                            vendedoresMap[vIdNorm].logradoSubgrupos[subgrupo] = { monto: 0, cajas: 0 };
                        }
                        vendedoresMap[vIdNorm].logradoSubgrupos[subgrupo].monto += sale.monto;
                        vendedoresMap[vIdNorm].logradoSubgrupos[subgrupo].cajas += (sale.cajas || 0);
                    }
                });

                const ranking = Object.values(vendedoresMap).sort((a, b) => b.monto - a.monto);
                const activeClientsCount = clientesUnicos.size;
                const totalPedidos = facturasUnicas.size;
                const precioPromedio = totalUnidades > 0 ? totalMonto / totalUnidades : 0;
                const ticketPromedio = totalPedidos > 0 ? totalMonto / totalPedidos : 0;

                return { totalMonto, totalUnidades, totalCajas, totalPedidos, activeClientsCount, ranking, productos: productosUnicos.size, precioPromedio, ticketPromedio };
            }, [sales, myTeam, myTeamIds, currentMonthStr]);

            const teamMetaMonto = myTeam.reduce((acc, curr) => acc + (Number(curr.metas?.monto) || 0), 0);
            const teamMetaCajas = myTeam.reduce((acc, curr) => acc + (Number(curr.metas?.cajas) || 0), 0);

        const yieldToBrowser = () => new Promise((resolve) => {
            if (typeof requestAnimationFrame !== 'undefined') requestAnimationFrame(() => resolve());
            else setTimeout(resolve, 0);
        });

        const scheduleHeavyWrite = (fn) => {
            if (typeof requestIdleCallback !== 'undefined') {
                requestIdleCallback(() => { try { fn(); } catch (e) { console.warn(e); } }, { timeout: 8000 });
            } else {
                setTimeout(() => { try { fn(); } catch (e) { console.warn(e); } }, 0);
            }
        };

        function mapGitHubSalesRow(row, fileObj) {
            const normalizeKey = (key) => String(key).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, '');
            const getVal = (keys) => {
                const rowKeys = Object.keys(row);
                for (let k of keys) {
                    const targetKey = normalizeKey(k);
                    const foundKey = rowKeys.find(rk => normalizeKey(rk) === targetKey);
                    if (foundKey !== undefined) return row[foundKey];
                }
                return undefined;
            };
            const clienteVal = String(getVal(['Cliente', 'Client', 'NombreCliente', 'RazonSocial']) || '').trim().toUpperCase();
            const articuloVal = String(getVal(['Articulo', 'Article', 'Producto', 'Descripcion', 'Item']) || '').trim().toUpperCase();

            // Validar que los datos esenciales estén presentes (evitar filas vacías o basura)
            if (!clienteVal || !articuloVal) return null;

            // Quitar la restricción estricta de includes('TOTAL') pero evitar la fila de suma de totales exacta si ocurre
            if (clienteVal === 'TOTAL' || clienteVal === 'TOTAL GENERAL' || articuloVal === 'TOTAL' || articuloVal === 'TOTAL GENERAL') return null;

            let fechaVal = getVal(['Fecha', 'Date', 'Emision', 'Dia']);
            if (fechaVal) {
                if (typeof fechaVal === 'string') {
                    let fStr = String(fechaVal).trim().split(' ')[0];
                    if (fStr.includes('/')) {
                        const parts = fStr.split('/');
                        if (parts.length === 3) {
                            if (parts[2].length === 4) {
                                fechaVal = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                            } else if (parts[0].length === 4) {
                                fechaVal = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                            } else {
                                fechaVal = fStr.replace(/\//g, '-');
                            }
                        }
                    } else if (fStr.includes('-')) {
                        const parts = fStr.split('-');
                        if (parts.length === 3 && parts[2].length === 4) {
                            fechaVal = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                        } else {
                            fechaVal = fStr;
                        }
                    } else {
                        fechaVal = fStr;
                    }
                } else if (typeof fechaVal === 'number') {
                    const dateObj = new Date(Math.round((fechaVal - 25569) * 86400 * 1000));
                    fechaVal = dateObj.toISOString().split('T')[0];
                }
            } else if (getVal(['Mes', 'Month'])) {
                const mesNum = parseInt(String(getVal(['Mes', 'Month'])).replace(/[^0-9]/g, ''), 10) || 1;
                const mesStr = String(mesNum).padStart(2, '0');
                let yearVal = getVal(['Año', 'Ano', 'Year']);
                let finalYear;
                if (yearVal) {
                    finalYear = parseInt(String(yearVal).replace(/[^0-9]/g, ''), 10);
                } else {
                    const currentYear = new Date().getFullYear();
                    finalYear = fileObj.type === 'prevYear' ? currentYear - 1 : currentYear;
                }
                fechaVal = `${finalYear}-${mesStr}-01`;
            } else {
                fechaVal = new Date().toISOString().split('T')[0];
            }
            return {
                source: fileObj.type,
                fecha: fechaVal,
                idCliente: String(getVal(['IdCliente', 'CodigoCliente', 'CodCliente']) || 'S/N').trim(),
                cliente: clienteVal,
                grupo: String(getVal(['Grupo', 'Subgrupo', 'Linea', 'Marca']) || 'GENERAL').trim().toUpperCase(),
                idVendedor: String(getVal(['IdVendedor', 'CodigoVendedor', 'CodVendedor']) || 'S/N').trim(),
                vendedor: String(getVal(['Vendedor', 'Venedor', 'NombreVendedor']) || 'Sin Asignar').trim().toUpperCase(),
                supervisor: String(getVal(['Supervisor', 'Gerente']) || 'Sin Asignar').trim().toUpperCase(),
                tipoDoc: String(getVal(['TipoDoc', 'TipoDocumento', 'Documento']) || 'FA').trim().toUpperCase(),
                numero: String(getVal(['Numero', 'Factura', 'Nro']) || 'S/N').trim(),
                articulo: articuloVal,
                cajas: parseNum(getVal(['Cajas', 'Cj', 'Bultos', 'Caixes'])),
                unidades: parseNum(getVal(['Unidades', 'Und', 'Piezas', 'Unitats'])),
                monto: parseNum(getVal(['Monto', 'Importe', 'Total', 'Venta', 'Neto', 'Import']))
            };
        }

        async function parseExcelRowsChunked(excelRows, fileObj, isCancelled) {
            const out = [];
            const CHUNK = 1200;
            for (let i = 0; i < excelRows.length; i += CHUNK) {
                if (isCancelled()) return out;
                const end = Math.min(i + CHUNK, excelRows.length);
                for (let j = i; j < end; j++) {
                    const m = mapGitHubSalesRow(excelRows[j], fileObj);
                    if (m) out.push(m);
                }
                await yieldToBrowser();
            }
            return out;
        }

        async function parseJsonSalesChunked(data, sourceType, isCancelled) {
            if (!Array.isArray(data)) return [];
            const out = [];
            const CHUNK = 4000;
            for (let i = 0; i < data.length; i += CHUNK) {
                if (isCancelled()) return out;
                const end = Math.min(i + CHUNK, data.length);
                for (let j = i; j < end; j++) {
                    out.push({ ...data[j], source: sourceType });
                }
                await yieldToBrowser();
            }
            return out;
        }

        async function fetchGithubSalesFile(fileObj, isStale) {
            let rawUrl = fileObj.url.trim();
            if (rawUrl.includes('github.com') && rawUrl.includes('/blob/')) {
                rawUrl = rawUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            }
            const url = rawUrl + (rawUrl.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
            const urlLower = url.toLowerCase();
            try {
                if (urlLower.includes('.json')) {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("No se pudo descargar el archivo JSON.");
                    const data = await res.json();
                    return await parseJsonSalesChunked(data, fileObj.type, isStale);
                }
                if (urlLower.includes('.xls') || urlLower.includes('.csv') || urlLower.includes('.xlsx')) {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("No se pudo descargar el archivo Excel.");
                    const arrayBuffer = await res.arrayBuffer();
                    await yieldToBrowser();
                    if (!window.XLSX) throw new Error("XLSX no disponible");
                    const workbook = window.XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                    await yieldToBrowser();
                    const sheetName = workbook.SheetNames[0];
                    const excelRows = window.XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                    return await parseExcelRowsChunked(excelRows, fileObj, isStale);
                }
                return [];
            } catch (e) {
                console.error(`Error procesando archivo ${fileObj.type}:`, e);
                return [];
            }
        }



        function App() {
            const [firebaseUser, setFirebaseUser] = useState(null);
            const [isDbReady, setIsDbReady] = useState(false);
            const [isConfigLoaded, setIsConfigLoaded] = useState(false);
            const [isFetchingSales, setIsFetchingSales] = useState(false);
            const [lastSyncDateStr, setLastSyncDateStr] = useState(() => localStorage.getItem('lastGithubSyncDateStr') || null);
            const [, startSalesTransition] = useTransition();

            const [users, setUsers] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [carteraData, setCarteraData] = useState([]);
            const [catalogData, setCatalogData] = useState([]);
            const [preciosData, setPreciosData] = useState([]);
            const [cxcData, setCxcData] = useState([]);
            const [pedidosData, setPedidosData] = useState([]);
            const [salesData, setSalesData] = useState([]);
            const deferredSalesData = useDeferredValue(salesData);
            const [appConfig, setAppConfig] = useState(null);

            const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null, payload: null, title: '', message: '', isAlert: false });
            const [isConfirming, setIsConfirming] = useState(false);

            const openModal = (type, payload, title, message, isAlert = false) => { setModalConfig({ isOpen: true, type, payload, title, message, isAlert }); };
            const closeModal = () => { setModalConfig({ isOpen: false, type: null, payload: null, title: '', message: '', isAlert: false }); };

            const executeConfirmAction = async () => {
                if (modalConfig.isAlert) { closeModal(); return; }
                setIsConfirming(true);
                try {
                    const { type, payload } = modalConfig;
                    if (type === 'deleteUser') await deleteDoc(doc(db, getCollectionPath('users'), payload));
                    else if (type === 'deletePedido') await deleteDoc(doc(db, getCollectionPath('pedidos'), payload));
                    else if (type === 'clearCartera') {
                        const chunksDelete = chunkArray(carteraData, 450);
                        await Promise.all(chunksDelete.map(chunk => {
                            const batch = writeBatch(db);
                            chunk.forEach(c => { if (c.firebaseId) batch.delete(doc(db, getCollectionPath('cartera'), c.firebaseId)); });
                            return batch.commit();
                        }));
                    } else if (type === 'deleteClienteCartera') await deleteDoc(doc(db, getCollectionPath('cartera'), payload));
                    else if (type === 'deleteMetaRow') {
                        const userDoc = doc(db, getCollectionPath('users'), payload);
                        await updateDoc(userDoc, { metas: deleteField() });
                    } else if (type === 'deleteGroup') {
                        const grupo = payload;
                        for (const u of users) {
                            if (u.rol !== 'vendedor' || !u.metas?.grupos?.[grupo]) continue;
                            const newGrupos = { ...u.metas.grupos };
                            delete newGrupos[grupo];
                            await updateDoc(doc(db, getCollectionPath('users'), u.id), { metas: { ...u.metas, grupos: newGrupos } });
                        }
                    }
                } catch (error) {
                    console.error(error);
                    openModal('alert', null, 'Error', 'Hubo un error al procesar la solicitud.', true);
                } finally {
                    setIsConfirming(false);
                    closeModal();
                }
            };

            const [searchUserQuery, setSearchUserQuery] = useState("");
            const [selectedUserId, setSelectedUserId] = useState(null);
            const [loginPassword, setLoginPassword] = useState("");
            const [loginError, setLoginError] = useState("");
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [globalActiveTab, setGlobalActiveTab] = useState('ventas-mes');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (error) { console.error("Error autenticando", error); }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, user => { setFirebaseUser(user); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!firebaseUser) return;
                const unsubUsers = onSnapshot(collection(db, getCollectionPath('users')), snap => {
                    const dbUsers = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                    if (dbUsers.length === 0) {
                        const seedDatabase = async () => {
                            const batch = writeBatch(db);
                            initialUsersDB.forEach(u => batch.set(doc(db, getCollectionPath('users'), u.id), u));
                            await batch.commit();
                        };
                        seedDatabase();
                    } else {
                        setUsers(dbUsers);
                        if (currentUser) { const updatedMe = dbUsers.find(u => u.id === currentUser.id); if (updatedMe) setCurrentUser(updatedMe); }
                    }
                    setIsDbReady(true);
                });

                const unsubCartera = onSnapshot(collection(db, getCollectionPath('cartera')), snap => setCarteraData(snap.docs.map(d => ({ firebaseId: d.id, ...d.data() }))));
                const unsubCatalog = onSnapshot(collection(db, getCollectionPath('productos')), snap => setCatalogData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubPrecios = onSnapshot(collection(db, getCollectionPath('precios')), snap => setPreciosData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCxc = onSnapshot(collection(db, getCollectionPath('cxc')), snap => setCxcData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubPedidos = onSnapshot(collection(db, getCollectionPath('pedidos')), snap => setPedidosData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubConfig = onSnapshot(doc(db, getCollectionPath('config'), 'settings'), snap => {
                    if (snap.exists()) setAppConfig(snap.data());
                    else setAppConfig({});
                    setIsConfigLoaded(true);
                }, () => { setAppConfig({}); setIsConfigLoaded(true); });

                return () => { unsubUsers(); unsubCartera(); unsubCatalog(); unsubPrecios(); unsubCxc(); unsubPedidos(); unsubConfig(); };
            }, [firebaseUser]);

            const getLastSyncBoundary = React.useCallback(() => {
                const now = new Date();
                const hoursUTC = now.getUTCHours();
                if (hoursUTC < 21) {
                    return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() - 1, 21, 0, 0)).getTime();
                } else {
                    return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 21, 0, 0)).getTime();
                }
            }, []);

            const fetchGitHubData = React.useCallback(async (force = false, externalIsStale = null) => {
                const isStale = externalIsStale || (() => false);
                if (!appConfig || !currentUser) return;

                let cachedSales = null;
                try {
                    cachedSales = await loadFromCache('salesData');
                } catch (e) { console.warn(e); }
                if (isStale()) return;

                const boundary = getLastSyncBoundary();
                const lastSyncToken = localStorage.getItem('lastGithubSyncTimestamp');
                const lastSync = lastSyncToken ? parseInt(lastSyncToken, 10) : 0;

                if (!force && cachedSales && cachedSales.length > 0 && lastSync >= boundary) {
                    startSalesTransition(() => { if (!isStale()) setSalesData(cachedSales); });
                    return;
                }

                if (!force && cachedSales && cachedSales.length > 0) {
                    startSalesTransition(() => { if (!isStale()) setSalesData(cachedSales); });
                }

                const urls = [
                    { url: appConfig?.githubSalesUrlPrevYear, type: 'prevYear' },
                    { url: appConfig?.githubSalesUrlCurrYear, type: 'currYear' },
                    { url: appConfig?.githubSalesUrlCurrMonth, type: 'currMonth' }
                ].filter(item => item.url && item.url.trim() !== "");

                if (urls.length === 0) {
                    if (!cachedSales) startSalesTransition(() => { if (!isStale()) setSalesData([]); });
                    return;
                }

                if (!isStale()) setIsFetchingSales(true);
                try {
                    const combinedSales = [];
                    for (const fileObj of urls) {
                        if (isStale()) return;
                        await yieldToBrowser();
                        const part = await fetchGithubSalesFile(fileObj, isStale);
                        combinedSales.push(...part);
                    }
                    if (isStale()) return;

                    startSalesTransition(() => setSalesData(combinedSales));
                    scheduleHeavyWrite(() => saveToCache('salesData', combinedSales));

                    const now = new Date();
                    localStorage.setItem('lastGithubSyncTimestamp', now.getTime().toString());

                    const vetOpts = { timeZone: 'America/Caracas', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
                    let dateStr;
                    try {
                        dateStr = now.toLocaleString('es-VE', vetOpts);
                    } catch (e) {
                        dateStr = now.toLocaleString();
                    }
                    localStorage.setItem('lastGithubSyncDateStr', dateStr);
                    if (!isStale()) setLastSyncDateStr(dateStr);

                } catch (err) {
                    console.error("Error crítico cargando ventas:", err);
                    if (!cachedSales && !isStale()) openModal('alert', null, 'Error de Sincronización', 'Hubo un error al procesar los archivos de GitHub.', true);
                } finally {
                    if (!isStale()) setIsFetchingSales(false);
                }
            }, [appConfig, currentUser, getLastSyncBoundary]);

            const handleManualSync = () => {
                if (isFetchingSales) return;
                fetchGitHubData(true);
            };

            useEffect(() => {
                let cancelled = false;
                const isStale = () => cancelled;

                if (isConfigLoaded && currentUser) {
                    fetchGitHubData(false, isStale);
                } else if (!isConfigLoaded || !currentUser) {
                    startSalesTransition(() => setSalesData([]));
                }

                return () => { cancelled = true; };
            }, [appConfig?.githubSalesUrlPrevYear, appConfig?.githubSalesUrlCurrYear, appConfig?.githubSalesUrlCurrMonth, isConfigLoaded, currentUser?.id, fetchGitHubData]);

            const metasDiccionario = useMemo(() => {
                const dict = {};
                users.forEach(u => { if (u.metas) dict[u.id] = u.metas; });
                return dict;
            }, [users]);

            const fullCatalogWithPrices = useMemo(() => {
                return catalogData.map(prod => {
                    const priceItem = preciosData.find(p => p.sku === prod.sku);
                    return {
                        ...prod,
                        precio: priceItem ? priceItem.precio : 0,
                        precioCaja: priceItem ? priceItem.precioCaja : 0,
                        precioUnd: priceItem ? priceItem.precioUnd : 0,
                        und: priceItem ? priceItem.und : 0
                    };
                });
            }, [catalogData, preciosData]);

            const filteredUsers = useMemo(() => {
                if (!searchUserQuery) return users;
                return users.filter(u => (u.nombre || '').toLowerCase().includes(searchUserQuery.toLowerCase()) || (u.id || '').toLowerCase().includes(searchUserQuery.toLowerCase()));
            }, [users, searchUserQuery]);

            const handleUserSelect = (user) => {
                setSelectedUserId(user.id); setSearchUserQuery(`${user.nombre} (${user.id})`); setIsDropdownOpen(false); setLoginError("");
            };

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                const userToLogin = users.find(u => u.id === selectedUserId);
                if (!userToLogin) { setLoginError("Selecciona un usuario de la lista."); return; }
                if (userToLogin.password === loginPassword) {
                    setCurrentUser(userToLogin);
                    setGlobalActiveTab(userToLogin.rol === 'admin' ? 'ventas-global' : userToLogin.rol === 'gerente' ? 'ventas-mes' : 'ventas-mes');
                    setLoginPassword(""); setSearchUserQuery(""); setSelectedUserId(null); setLoginError("");
                } else { setLoginError("Contraseña incorrecta"); }
            };

            const handleInputFocus = () => { setIsDropdownOpen(true); if (selectedUserId) { setSearchUserQuery(""); setSelectedUserId(null); } };

            useEffect(() => {
                if (!currentUser) return;
                if (currentUser.rol === 'vendedor') {
                    if (['ventas-global', 'pedidos-admin'].includes(globalActiveTab)) setGlobalActiveTab('ventas-mes');
                } else if (currentUser.rol === 'gerente') {
                    if (['ventas-cartera-activacion'].includes(globalActiveTab)) setGlobalActiveTab('ventas-mes');
                }
            }, [currentUser?.id, currentUser?.rol]);

            if (!isDbReady) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-orange-600 flex items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse" style={{ animationDuration: '8s' }}></div>
                        <div className="absolute top-[20%] right-[-10%] w-96 h-96 bg-orange-400 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse" style={{ animationDuration: '10s', animationDelay: '2s' }}></div>
                        <div className="bg-white/90 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5)] max-w-md w-full relative z-10 border border-white/40">
                            <div className="text-center mb-10">
                                <div className="w-20 h-20 bg-gradient-to-tr from-orange-400 to-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg transform rotate-3">
                                    <ShoppingCart className="text-white" size={40} />
                                </div>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tight mb-2">COMACA <span className="text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-orange-600">360</span></h1>
                                <p className="text-slate-500 text-sm font-medium">Ventas, pedidos y rutas — un solo acceso</p>
                            </div>
                            <form onSubmit={handleLoginSubmit} className="space-y-6">
                                <div className="relative">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Perfil</label>
                                    <div className="relative">
                                        <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input type="text" value={searchUserQuery}
                                            onChange={(e) => { setSearchUserQuery(e.target.value); setIsDropdownOpen(true); setSelectedUserId(null); }}
                                            onFocus={handleInputFocus} placeholder="Nombre o código..."
                                            className="w-full border-2 border-slate-200 focus:border-blue-600 rounded-xl p-4 pl-12 outline-none font-medium text-slate-700 bg-white" required />
                                        {isDropdownOpen && (
                                            <div className="absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-xl max-h-56 overflow-y-auto">
                                                {filteredUsers.length > 0 ? filteredUsers.map(u => (
                                                    <div key={u.id} onClick={() => handleUserSelect(u)} className="p-4 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-0 flex justify-between items-center">
                                                        <div><p className="font-bold text-slate-800 text-sm">{u.nombre}</p><p className="text-xs text-slate-500">ID: {u.id}</p></div>
                                                        <span className={`text-[10px] font-black px-2 py-1 rounded-full uppercase ${u.rol === 'admin' ? 'bg-red-100 text-red-600' : u.rol === 'gerente' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>{u.rol}</span>
                                                    </div>
                                                )) : <div className="p-6 text-center text-sm text-slate-500">Sin resultados</div>}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                                    <div className="relative">
                                        <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input type="password" value={loginPassword} onChange={e => { setLoginPassword(e.target.value); setLoginError(""); }}
                                            className="w-full border-2 border-slate-200 focus:border-blue-600 rounded-xl p-4 pl-12 outline-none font-medium text-slate-800 bg-white" required />
                                    </div>
                                    {loginError && <p className="text-red-500 text-xs font-bold mt-2">{loginError}</p>}
                                </div>
                                <button type="submit" disabled={!selectedUserId} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl hover:bg-blue-700 transition-all shadow-md disabled:opacity-50">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const NavBtn = ({ id, icon: Icon, children }) => (
                <div onClick={() => { flushSync(() => setGlobalActiveTab(id)); }}
                    className={`p-3 rounded-lg flex items-center gap-3 cursor-pointer transition-colors ${globalActiveTab === id ? 'bg-blue-800/50 text-orange-400 border border-blue-700/50' : 'text-blue-200 hover:bg-blue-800 hover:text-white'}`}>
                    <Icon size={20} /><span className="font-medium text-sm">{children}</span>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
                    <ConfirmModal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} onConfirm={executeConfirmAction} onCancel={closeModal} isLoading={isConfirming} isAlert={modalConfig.isAlert} />

                    <aside className="w-full md:w-72 bg-blue-900 text-white flex flex-col shadow-xl z-20 hidden md:flex shrink-0 overflow-y-auto max-h-screen">
                        <div className="p-6 shrink-0">
                            <h1 className="text-2xl font-black mb-1">COMACA <span className="text-orange-500">360</span></h1>
                            <p className="text-blue-300 text-xs tracking-wider uppercase">Ventas & pedidos</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-1 pb-4">
                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest px-3 pt-2 pb-1">Ventas / BI</p>
                            {currentUser.rol === 'admin' && <NavBtn id="ventas-global" icon={LayoutDashboard}>Panel ventas (corp.)</NavBtn>}
                            {(currentUser.rol === 'vendedor' || currentUser.rol === 'admin') && <NavBtn id="ventas-mes" icon={LayoutDashboard}>Indicadores (mes)</NavBtn>}
                            {currentUser.rol === 'gerente' && <NavBtn id="ventas-mes" icon={LayoutDashboard}>Mi equipo (mes)</NavBtn>}
                            <NavBtn id="ventas-historico" icon={History}>Histórico ventas</NavBtn>
                            {(currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <NavBtn id="ventas-ia" icon={Sparkles}>Análisis IA</NavBtn>}
                            {(currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <NavBtn id="share-ventas" icon={() => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>}>Market Share</NavBtn>}
                            {currentUser.rol === 'vendedor' && <NavBtn id="ventas-cartera-activacion" icon={BookOpen}>Cartera (activación)</NavBtn>}

                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest px-3 pt-4 pb-1">Pedidos</p>
                            {(currentUser.rol === 'vendedor' || currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <NavBtn id="pedidos-vendedor" icon={ShoppingCart}>Tomar pedidos</NavBtn>}
                            {(currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <NavBtn id="pedidos-admin" icon={Receipt}>Admin pedidos / catálogo</NavBtn>}
                            {(currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <NavBtn id="gerente-mapa" icon={MapIcon}>Mapa de visitas</NavBtn>}

                            <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest px-3 pt-4 pb-1">Ayuda</p>
                            <NavBtn id="guia" icon={HelpCircle}>Guía de uso</NavBtn>
                        </nav>
                        <div className="p-4 border-t border-blue-800 mt-auto shrink-0">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center font-bold">{(currentUser.nombre || 'U').charAt(0)}</div>
                                <div className="overflow-hidden min-w-0"><p className="text-sm font-bold truncate">{currentUser.nombre}</p><p className="text-xs text-blue-300 capitalize">{currentUser.rol}</p></div>
                            </div>
                            <button onClick={() => setCurrentUser(null)} className="w-full py-2 flex items-center justify-center gap-2 text-sm text-blue-200 hover:text-white hover:bg-blue-800 rounded-lg"><LogOut size={16} /> Salir</button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 relative">
                        <header className="bg-blue-900 text-white p-4 flex justify-between items-center md:hidden shrink-0 print-hide">
                            <h1 className="text-xl font-black">COMACA <span className="text-orange-500">360</span></h1>
                            <button onClick={() => setCurrentUser(null)}><LogOut size={20} /></button>
                        </header>
                        <div className="bg-white border-b border-slate-200 flex md:hidden overflow-x-auto print-hide">
                            {[
                                ...(currentUser.rol === 'admin' ? [['ventas-global', 'Corp.']] : []),
                                ['ventas-mes', 'Mes'],
                                ['ventas-historico', 'Hist.'],
                                ...((currentUser.rol === 'admin' || currentUser.rol === 'gerente') ? [['ventas-ia', 'IA']] : []),
                                ...((currentUser.rol === 'admin' || currentUser.rol === 'gerente') ? [['share-ventas', 'M.Share']] : []),
                                ...(currentUser.rol === 'vendedor' ? [['ventas-cartera-activacion', 'Activa.']] : []),
                                ...((currentUser.rol === 'vendedor' || currentUser.rol === 'admin' || currentUser.rol === 'gerente') ? [['pedidos-vendedor', 'Pedidos']] : []),
                                ...((currentUser.rol === 'admin' || currentUser.rol === 'gerente') ? [['pedidos-admin', 'Adm.Ped.']] : []),
                                ...((currentUser.rol === 'admin' || currentUser.rol === 'gerente') ? [['gerente-mapa', 'Mapa']] : []),
                                ['guia', 'Guía'],
                            ].map(([id, label]) => (
                                <button key={id} onClick={() => { flushSync(() => setGlobalActiveTab(id)); }}
                                    className={`px-3 py-3 text-xs font-bold whitespace-nowrap border-b-2 ${globalActiveTab === id ? 'border-orange-400 text-orange-200' : 'border-transparent text-blue-200'}`}>{label}</button>
                            ))}
                        </div>
                        <header className="bg-white px-8 py-4 shadow-sm border-b border-slate-100 hidden md:flex justify-between items-center z-10 shrink-0 print-hide">
                            <h2 className="text-xl font-bold text-slate-800 capitalize">COMACA 360 / {currentUser.rol}</h2>
                            <div className="flex items-center gap-4">
                                {lastSyncDateStr && (
                                    <div className="text-[10px] text-slate-400 font-medium text-right leading-tight">
                                        Última sincronización<br /><span className="text-slate-600 font-bold">{lastSyncDateStr}</span>
                                    </div>
                                )}
                                <button onClick={handleManualSync} disabled={isFetchingSales} className="text-sm font-bold text-slate-600 bg-white hover:bg-slate-50 border-2 border-slate-200 px-4 py-2 rounded-xl flex items-center gap-2 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50">
                                    {isFetchingSales ? (
                                        <><div className="w-3 h-3 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div> Sincronizando...</>
                                    ) : (
                                        <><RefreshCw size={14} className="text-blue-500" /> Sincronizar Ahora</>
                                    )}
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto relative z-0 print-scroll-reset">
                            {isFetchingSales && salesData.length === 0 && (globalActiveTab.startsWith('ventas') || globalActiveTab === 'guia') && (
                                <div className="absolute inset-0 bg-slate-50/80 backdrop-blur-[2px] z-50 flex flex-col items-center justify-center m-4 rounded-2xl border border-blue-100">
                                    <div className="w-14 h-14 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-3"></div>
                                    <p className="font-bold text-blue-900">Cargando ventas…</p>
                                </div>
                            )}
                            {isFetchingSales && salesData.length > 0 && (
                                <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-2 rounded-xl shadow-xl flex items-center gap-2 z-50 text-sm">
                                    <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> Sincronizando ventas…
                                </div>
                            )}

                            {globalActiveTab === 'guia' && <GuiaUsuario currentUser={currentUser} />}
                            {globalActiveTab === 'ventas-ia' && (currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <AIAnalysisDashboard currentUser={currentUser} sales={deferredSalesData} appConfig={appConfig} users={users} openModal={openModal} />}
                            {globalActiveTab === 'share-ventas' && (currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <MarketSharePanel sales={deferredSalesData} users={users} />}
                            {globalActiveTab === 'ventas-historico' && <HistoricoDashboard currentUser={currentUser} sales={deferredSalesData} users={users} />}
                            {globalActiveTab === 'ventas-cartera-activacion' && currentUser.rol === 'vendedor' && <VentasVendedorDashboard userId={currentUser.id} sales={deferredSalesData} metas={metasDiccionario} cartera={carteraData} activeTab="cartera" />}
                            {globalActiveTab === 'ventas-mes' && currentUser.rol === 'vendedor' && <VentasVendedorDashboard userId={currentUser.id} sales={deferredSalesData} metas={metasDiccionario} cartera={carteraData} activeTab="dashboard" />}
                            {globalActiveTab === 'ventas-mes' && currentUser.rol === 'gerente' && <GerenteDashboard userId={currentUser.id} users={users} sales={deferredSalesData} cartera={carteraData} cxc={cxcData} />}
                            {globalActiveTab === 'ventas-global' && currentUser.rol === 'admin' && <VentasAdminPanel sales={deferredSalesData} setSales={setSalesData} users={users} setUsers={setUsers} cartera={carteraData} setCartera={setCarteraData} openModal={openModal} appConfig={appConfig} setAppConfig={setAppConfig} precios={preciosData} />}
                            {globalActiveTab === 'ventas-mes' && currentUser.rol === 'admin' && <VentasAdminPanel sales={deferredSalesData} setSales={setSalesData} users={users} setUsers={setUsers} cartera={carteraData} setCartera={setCarteraData} openModal={openModal} appConfig={appConfig} setAppConfig={setAppConfig} precios={preciosData} />}
                            {globalActiveTab === 'pedidos-vendedor' && (currentUser.rol === 'vendedor' || currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <PedidosVendedorDashboard currentUser={currentUser} cartera={carteraData} catalog={fullCatalogWithPrices} precios={preciosData} pedidos={pedidosData} cxc={cxcData} openModal={openModal} />}
                            {globalActiveTab === 'pedidos-admin' && (currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <PedidosAdminPanel currentUser={currentUser} users={users} cartera={carteraData} catalog={catalogData} precios={preciosData} pedidos={pedidosData} cxc={cxcData} openModal={openModal} db={db} getCollectionPath={getCollectionPath} />}
                            {globalActiveTab === 'gerente-mapa' && (currentUser.rol === 'admin' || currentUser.rol === 'gerente') && <AdminZonasMap pedidos={pedidosData} users={users} currentUser={currentUser} />}
                        </div>
                    </main>
                </div>
            );
        }


        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
