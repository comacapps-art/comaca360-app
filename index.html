                                    <TrendingUp className="text-orange-500" /> Ventas por Línea
                                </h3>
                                <span className="text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-full">Clic para ver detalle</span>
                            </div>

                            <div className="space-y-4">
                                {Object.entries(stats.gruposMap).map(([grupoRaw, data]) => {
                                    const grupo = String(grupoRaw).trim().toUpperCase();

                                    // Búsqueda inteligente de la meta (ignora mayúsculas/minúsculas y espacios extra)
                                    let metaGrupoObj = { monto: 0, cajas: 0 };
                                    if (myMeta.grupos) {
                                        const metaKey = Object.keys(myMeta.grupos).find(k => String(k).trim().toUpperCase() === grupo);
                                        if (metaKey) metaGrupoObj = myMeta.grupos[metaKey];
                                    }

                                    const metaGrupoMonto = metaGrupoObj.monto || 0;
                                    const metaGrupoCajas = metaGrupoObj.cajas || 0;

                                    const porcentajeMonto = metaGrupoMonto > 0 ? Math.min((data.monto / metaGrupoMonto) * 100, 100) : 100;
                                    const porcentajeCajas = metaGrupoCajas > 0 ? Math.min((data.cajas / metaGrupoCajas) * 100, 100) : 100;
                                    const isExpanded = expandedGrupo === grupoRaw;

                                    return (
                                        <div key={grupoRaw} className="border-2 border-slate-100 hover:border-blue-200 rounded-xl transition-all overflow-hidden">
                                            <div className="p-3 cursor-pointer bg-white hover:bg-blue-50/30 flex flex-col justify-center" onClick={() => setExpandedGrupo(isExpanded ? null : grupoRaw)}>
                                                <div className="flex justify-between items-start text-sm mb-2 text-slate-700 px-2">
                                                    <span className="font-black text-base flex items-center gap-2 mt-1">
                                                        {isExpanded ? <ChevronUp size={16} className="text-blue-600" /> : <ChevronDown size={16} className="text-slate-400" />}
                                                        {grupoRaw} {metaGrupoMonto === 0 && metaGrupoCajas === 0 && <span className="text-[10px] text-orange-500 font-bold uppercase bg-orange-50 px-2 py-0.5 rounded-full ml-2">(Sin Meta)</span>}
                                                        <span className="text-[10px] bg-blue-100 text-blue-700 font-black px-2 py-0.5 rounded-full flex items-center gap-1 ml-2 shadow-sm border border-blue-200"><Users size={12} /> {data.clientesUnicos.size} clientes</span>
                                                    </span>
                                                    <div className="text-right">
                                                        <span className="font-black text-blue-900 text-base block">${data.monto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                                                        <span className="text-[11px] text-slate-500 font-bold">{Number(data.cajas).toLocaleString(undefined, { maximumFractionDigits: 2 })} cj | {Number(data.unidades).toLocaleString(undefined, { maximumFractionDigits: 2 })} un</span>
                                                    </div>
                                                </div>
                                                <div className="flex flex-col gap-1.5 ml-8 mr-2 mt-1">
                                                    <div className="w-full bg-slate-200 rounded-full h-2 flex overflow-hidden" title={`Monto: $${Number(data.monto).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} / Meta: $${Number(metaGrupoMonto).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`}>
                                                        <div className={`${metaGrupoMonto > 0 ? 'bg-blue-600' : 'bg-slate-400'} h-2 rounded-full`} style={{ width: `${porcentajeMonto}%` }}></div>
                                                    </div>
                                                    <div className="w-full bg-slate-200 rounded-full h-2 flex overflow-hidden" title={`Cajas: ${Number(data.cajas).toLocaleString(undefined, { maximumFractionDigits: 2 })} / Meta: ${Number(metaGrupoCajas).toLocaleString(undefined, { maximumFractionDigits: 2 })}`}>
                                                        <div className={`${metaGrupoCajas > 0 ? 'bg-yellow-500' : 'bg-slate-400'} h-2 rounded-full`} style={{ width: `${porcentajeCajas}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>

                                            {isExpanded && (
                                                <div className="bg-slate-50 border-t border-slate-100 p-4 text-sm animate-fadeIn overflow-x-auto">
                                                    <table className="w-full text-left min-w-[400px]">
                                                        <thead className="text-xs text-slate-500 uppercase font-bold border-b-2 border-slate-200">
                                                            <tr>
                                                                <th className="pb-3">Cliente</th>
                                                                <th className="pb-3">Artículo</th>
                                                                <th className="pb-3 text-right">Cajas</th>
                                                                <th className="pb-3 text-right">Unidades</th>
                                                                <th className="pb-3 text-right">Monto</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-200/50">
                                                            {data.detalle.slice(0, 100).map((venta, idx) => (
                                                                <tr key={idx} className="hover:bg-white transition-colors">
                                                                    <td className="py-3 text-xs font-bold text-slate-700 max-w-[120px] truncate pr-2" title={venta.cliente}>{venta.cliente}</td>
                                                                    <td className="py-3 text-xs font-medium text-slate-600 max-w-[150px] truncate pr-2" title={venta.articulo}>
                                                                        {venta.tipoDoc === 'DV' && <span className="text-[9px] font-black text-white bg-red-500 mr-2 px-1.5 py-0.5 rounded shadow-sm">DEV</span>}
                                                                        {venta.articulo}
                                                                    </td>
                                                                    <td className="py-3 text-xs text-right font-bold text-slate-600">{Number(venta.cajas).toLocaleString(undefined, { maximumFractionDigits: 2 })}</td>
                                                                    <td className="py-3 text-xs text-right font-bold text-slate-600">{Number(venta.unidades).toLocaleString(undefined, { maximumFractionDigits: 2 })}</td>
                                                                    <td className={`py-3 text-xs text-right font-black ${venta.monto < 0 ? 'text-red-600' : 'text-blue-900'}`}>
                                                                        ${venta.monto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                    {data.detalle.length > 100 && <div className="mt-2 text-center text-[10px] font-bold text-slate-400">Mostrando los primeros 100 registros.</div>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                                {Object.keys(stats.gruposMap).length === 0 && (
                                    <div className="p-8 text-center bg-slate-50 rounded-xl border border-slate-100">
                                        <p className="text-sm text-slate-500 font-medium">Aún no hay ventas por grupo registradas este mes.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col max-h-[500px]">
                            <div className="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-5">
                                <h3 className="font-black text-lg flex items-center gap-3">
                                    <Users size={22} className="text-orange-400" /> Clientes Atendidos (Mes en Curso)
                                </h3>
                            </div>
                            <div className="divide-y divide-slate-100 overflow-y-auto">
                                {Object.entries(stats.clientsMap).filter(([_, c]) => c.monto > 0).slice(0, 150).map(([id, cliente]) => (
                                    <div key={id} className="w-full">
                                        <button
                                            onClick={() => setExpandedClient(expandedClient === id ? null : id)}
                                            className="w-full px-6 py-4 flex justify-between items-center hover:bg-blue-50/50 transition-colors focus:outline-none"
                                        >
                                            <div className="text-left flex-1">
                                                <p className="font-black text-slate-800 text-sm md:text-base">{cliente.nombre}</p>
                                                <p className="text-[11px] font-bold text-slate-400 mt-0.5 tracking-wider">ID: {id}</p>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <div className="text-right hidden sm:block">
                                                    <p className="font-black text-blue-900 text-base">${cliente.monto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</p>
                                                    <p className="text-[11px] text-slate-500 font-bold mt-0.5">{Number(cliente.cajas).toLocaleString(undefined, { maximumFractionDigits: 2 })} cj | {Number(cliente.unidades).toLocaleString(undefined, { maximumFractionDigits: 2 })} un</p>
                                                </div>
                                                <div className={`p-2 rounded-full transition-colors ${expandedClient === id ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-400'}`}>
                                                    {expandedClient === id ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
                                                </div>
                                            </div>
                                        </button>

                                        {expandedClient === id && (
                                            <div className="bg-slate-50/80 px-6 py-4 border-t border-slate-100 text-sm animate-fadeIn">
                                                <table className="w-full">
                                                    <thead>
                                                        <tr className="text-slate-500 border-b-2 border-slate-200 text-xs uppercase font-bold">
                                                            <th className="text-left pb-2">Artículo</th>
                                                            <th className="text-center pb-2">Doc.</th>
                                                            <th className="text-right pb-2">Cajas</th>
                                                            <th className="text-right pb-2">Uds</th>
                                                            <th className="text-right pb-2">Total</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-200/50">
                                                        {cliente.articulos.map((art, idx) => (
                                                            <tr key={idx} className="hover:bg-white transition-colors">
                                                                <td className="py-2.5 text-xs font-bold text-slate-700">{art.articulo}</td>
                                                                <td className="py-2.5 text-center text-[10px] font-black">
                                                                    <span className={`px-2 py-1 rounded text-white shadow-sm ${art.tipoDoc === 'FA' ? 'bg-green-500' : 'bg-red-500'}`}>
                                                                        {art.tipoDoc}
                                                                    </span>
                                                                </td>
                                                                <td className="py-2.5 text-right font-bold text-slate-600">{Number(art.cajas).toLocaleString(undefined, { maximumFractionDigits: 2 })}</td>
                                                                <td className="py-2.5 text-right font-bold text-slate-600">{Number(art.unidades).toLocaleString(undefined, { maximumFractionDigits: 2 })}</td>
                                                                <td className={`py-2.5 text-right font-black ${art.monto < 0 ? 'text-red-600' : 'text-blue-900'}`}>
                                                                    ${art.monto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {Object.keys(stats.clientsMap).length === 0 && (
                                    <div className="p-10 text-center text-slate-400 font-medium">
                                        Aún no hay clientes activados este mes.
                                    </div>
                                )}
                                {Object.keys(stats.clientsMap).length > 150 && <div className="p-4 text-center text-xs font-bold text-slate-400 bg-slate-50 border-t border-slate-100">Mostrando los primeros 150 registros. Utiliza el buscador para encontrar resultados específicos.</div>}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col max-h-[500px]">
                            <div className="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-5">
                                <h3 className="font-black text-lg flex items-center gap-3">
                                    <Package size={22} className="text-orange-400" /> Desempeño del Catálogo
                                </h3>
                            </div>

                            <div className="overflow-x-auto overflow-y-auto">
                                <table className="w-full text-sm text-left relative">
                                    <thead className="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-wider sticky top-0 shadow-sm z-10">
                                        <tr>
                                            <th className="px-6 py-4">Artículo</th>
                                            <th className="px-4 py-4 text-center">Línea</th>
                                            <th className="px-4 py-4 text-center">Clts</th>
                                            <th className="px-4 py-4 text-right">Caj</th>
                                            <th className="px-4 py-4 text-right">Uds</th>
                                            <th className="px-6 py-4 text-right text-blue-900">Total ($)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {stats.listaProductos.slice(0, 150).map((prod, idx) => (
                                            <tr key={idx} className="hover:bg-blue-50/30 transition-colors">
                                                <td className="px-6 py-3 font-bold text-slate-700 text-xs max-w-[200px] truncate" title={prod.nombre}>
                                                    {prod.nombre}
                                                </td>
                                                <td className="px-4 py-3 text-center">
                                                    <span className="text-[9px] font-black text-blue-700 bg-blue-50 px-2 py-1 rounded-full uppercase tracking-widest">
                                                        {prod.grupo}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-3 text-center font-black text-orange-600">
                                                    {prod.cantidadClientes}
                                                </td>
                                                <td className="px-4 py-3 text-right font-bold text-slate-500">
                                                    {Number(prod.cajas).toLocaleString(undefined, { maximumFractionDigits: 2 })}
                                                </td>
                                                <td className="px-4 py-3 text-right font-bold text-slate-500">
                                                    {Number(prod.unidades).toLocaleString(undefined, { maximumFractionDigits: 2 })}
                                                </td>
                                                <td className={`px-6 py-3 text-right font-black ${prod.monto < 0 ? 'text-red-600' : 'text-slate-800'}`}>
                                                    ${prod.monto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                const currentSales = sales.filter(s => s.source === 'currMonth' || (!s.source && s.fecha && String(s.fecha).startsWith(currentMonthStr)));

                let totalMonto = 0; let totalUnidades = 0; let totalCajas = 0;
                const vendedoresMap = {}; const clientesUnicos = new Set();
                const productosUnicos = new Set(); const facturasUnicas = new Set();

                // 1. Inicializar mapa con TODOS los vendedores de la base de datos para asegurar metas perfectas
                users.filter(u => u.rol === 'vendedor').forEach(u => {

                    };
                });

                // 2. Sumar las ventas y asignarlas al vendedor correspondiente
                currentSales.forEach(sale => {
                    totalMonto += sale.monto; totalUnidades += sale.unidades; totalCajas += sale.cajas || 0;
                    if (sale.monto > 0) { clientesUnicos.add(sale.idCliente); productosUnicos.add(sale.articulo); }
                    if (sale.numero && sale.tipoDoc !== 'DV') facturasUnicas.add(sale.numero);

                    const vIdNorm = normalizeId(sale.idVendedor) || 'S/N';

                    const updateLogradoGrupos = (vMap, grupo, saleMonto, saleCajas) => {
                        const g = grupo || 'GENERAL';
                        if (!vMap.logradoGrupos) vMap.logradoGrupos = {};
                        if (!vMap.logradoGrupos[g]) vMap.logradoGrupos[g] = { monto: 0, cajas: 0 };
                        vMap.logradoGrupos[g].monto += saleMonto;
                        vMap.logradoGrupos[g].cajas += saleCajas;
                    };

                    const updateLogradoSubgrupos = (vMap, subgrupo, saleMonto, saleCajas) => {
                        const sg = subgrupo || 'SIN SUBGRUPO';
                        if (!vMap.logradoSubgrupos) vMap.logradoSubgrupos = {};
                        if (!vMap.logradoSubgrupos[sg]) vMap.logradoSubgrupos[sg] = { monto: 0, cajas: 0 };
                        vMap.logradoSubgrupos[sg].monto += saleMonto;
                        vMap.logradoSubgrupos[sg].cajas += saleCajas;
                    };

                    // Si el vendedor existe en nuestra BD de usuarios, sumar ahí
                    if (vendedoresMap[vIdNorm]) {
                        vendedoresMap[vIdNorm].monto += sale.monto;
                        vendedoresMap[vIdNorm].unidades += sale.unidades;
                        vendedoresMap[vIdNorm].cajas += sale.cajas || 0;
                        updateLogradoGrupos(vendedoresMap[vIdNorm], sale.grupo, sale.monto, sale.cajas || 0);
                        updateLogradoSubgrupos(vendedoresMap[vIdNorm], sale.subgrupo, sale.monto, sale.cajas || 0);
                    } else {
                        // Fallback: buscar por coincidencia de nombre parcial si el ID del Excel falló
                        const matchByName = Object.values(vendedoresMap).find(v => sale.vendedor && v.nombre.toUpperCase().includes(normalizeName(sale.vendedor)));

                        if (matchByName) {
                            const matchIdNorm = normalizeId(matchByName.id);
                            vendedoresMap[matchIdNorm].monto += sale.monto;
                            vendedoresMap[matchIdNorm].unidades += sale.unidades;
                            vendedoresMap[matchIdNorm].cajas += sale.cajas || 0;
                            updateLogradoGrupos(vendedoresMap[matchIdNorm], sale.grupo, sale.monto, sale.cajas || 0);
                            updateLogradoSubgrupos(vendedoresMap[matchIdNorm], sale.subgrupo, sale.monto, sale.cajas || 0);
                        } else {
                            // Si definitivamente no está registrado, lo agregamos como "Vendedor Desconocido"
                            if (!vendedoresMap[vIdNorm]) {
                                vendedoresMap[vIdNorm] = { id: sale.idVendedor, nombre: sale.vendedor || 'Vendedor Desconocido', monto: 0, unidades: 0, cajas: 0, metaMonto: 0, metaCajas: 0, metaUnidades: 0, metaGrupos: {}, logradoGrupos: {}, metaSubgrupos: {}, logradoSubgrupos: {}, hasAnyMeta: false };
                            }
                            vendedoresMap[vIdNorm].monto += sale.monto;
                            vendedoresMap[vIdNorm].unidades += sale.unidades;
                            vendedoresMap[vIdNorm].cajas += sale.cajas || 0;
                            updateLogradoGrupos(vendedoresMap[vIdNorm], sale.grupo, sale.monto, sale.cajas || 0);
                            updateLogradoSubgrupos(vendedoresMap[vIdNorm], sale.subgrupo, sale.monto, sale.cajas || 0);
                        }
                    }
                });

                const ranking = Object.values(vendedoresMap)
                    .filter(v => v.monto > 0 || v.metaMonto > 0 || v.hasAnyMeta) // Ocultar los que no tienen metas ni ventas
                    .sort((a, b) => b.monto - a.monto);

                const activeClientsCount = clientesUnicos.size;
                const totalPedidos = facturasUnicas.size;
                const precioPromedio = totalUnidades > 0 ? totalMonto / totalUnidades : 0;
                const ticketPromedio = totalPedidos > 0 ? totalMonto / totalPedidos : 0;

                return { totalMonto, totalUnidades, totalCajas, totalPedidos, activeClientsCount, ranking, productos: productosUnicos.size, precioPromedio, ticketPromedio };
            }, [sales, users, currentMonthStr]);

            const filteredCarteraAdmin = useMemo(() => {
                return cartera.map((c, idx) => ({ ...c, firebaseId: c.firebaseId || idx }))
                    .filter(c => c.cliente.toLowerCase().includes(adminSearchCartera.toLowerCase()) || c.vendedorNombre.toLowerCase().includes(adminSearchCartera.toLowerCase()) || c.idVendedor.includes(adminSearchCartera));
            }, [cartera, adminSearchCartera]);

            const carteraInputRef = useRef(null);
            const metasInputRef = useRef(null);

            const [selectedCarteraFile, setSelectedCarteraFile] = useState(null);
            const [userForm, setUserForm] = useState({ nombre: "", idPersonal: "", email: "", password: "", rol: "vendedor", supervisor: "", listaBase: "", listasVisibles: [] });

            const handleCarteraFileSelect = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setSelectedCarteraFile(file.name); setCarteraUploadStatus('uploading');
                try {
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        try {
                            const data = new Uint8Array(evt.target.result);
                            const workbook = window.XLSX.read(data, { type: 'array' });
                            const sheetName = workbook.SheetNames[0];
                            const excelRows = window.XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                            const novaCartera = excelRows.map(row => {
                                const vStr = String(row['Vendedor'] || row['Venedor'] || '').trim();
                                const p = vStr.split('-');
                                const idV = p[0].trim(); const nomV = p.slice(1).join('-').trim() || vStr;
                                return { idVendedor: idV, vendedorNombre: nomV, cliente: String(row['Cliente'] || row['Client'] || 'Cliente Desconocido').trim() };
                            }).filter(c => c.cliente && c.idVendedor);

                            if (novaCartera.length > 0) {
                                const chunksDelete = chunkArray(cartera, 450);
                                const deletePromises = chunksDelete.map(chunk => {
                                    const batch = writeBatch(db);
                                    chunk.forEach(c => { if (c.firebaseId) batch.delete(doc(db, getCollectionPath('cartera'), c.firebaseId)); });

                                openModal('alert', null, 'Atención', 'El archivo parece estar vacío o faltan las columnas Vendedor y Cliente.', true);
                                setCarteraUploadStatus('idle');

                        setTimeout(() => { setCarteraUploadStatus('idle'); setSelectedCarteraFile(null); }, 4000);

                    reader.readAsArrayBuffer(file);
                } catch (error) { setCarteraUploadStatus('idle'); }

            const handleDownloadPlantillaMetas = () => {
                let headerHtml = `<th>ID_Vendedor</th><th>Nombre_Vendedor</th><th>Meta_Global_Monto</th><th>Meta_Global_Cajas</th><th>Meta_Global_Unidades</th><th>Meta_Global_Clientes</th>`;

                const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });

                document.body.appendChild(link); link.click(); document.body.removeChild(link);

            const handleMetasFileSelect = async (e) => {

                            const sheetName = workbook.SheetNames[0];

                                    if (monto > 0 || cajas > 0) subgruposObj[sg] = { monto, cajas };

                if (!newMetas[index].grupos) newMetas[index].grupos = {};
                if (!newMetas[index].grupos[grupo]) newMetas[index].grupos[grupo] = { monto: 0, cajas: 0 };
                newMetas[index].grupos[grupo][tipo] = parseNum(value);
                setMetasMasivas(newMetas);

            const handleMetaSubgrupoChange = (index, grupo, tipo, value) => {
                const newMetas = [...metasMasivas];
                if (!newMetas[index].subgrupos) newMetas[index].subgrupos = {};
                if (!newMetas[index].subgrupos[grupo]) newMetas[index].subgrupos[grupo] = { monto: 0, cajas: 0 };
                newMetas[index].subgrupos[grupo][tipo] = parseNum(value);
                setMetasMasivas(newMetas);

                            await updateDoc(doc(db, getCollectionPath('users'), existingUser.id), { metas: metaPayload });
                            updatedCount++;
                        }

                    } else {
                        openModal('alert', null, 'Aviso', "Los IDs no coinciden con ningún vendedor en 'Gestión de Usuarios'.", true);
                        setSaveStatus('idle');

                setTimeout(() => { if (saveStatus !== 'idle') setSaveStatus('idle'); }, 3000);

                if (!localApiKey.trim()) {

                setSavingConfig(true);
                setConfigError("");
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${localApiKey.trim()}`);
                    const data = await res.json();

                    if (data.error) {
                        throw new Error(data.error.message);
                    }

                    if (data.models) {
                        const validModels = data.models
                            .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
                            .map(m => m.name.replace('models/', ''));

                        if (validModels.length > 0) {
                            setAvailableModels(validModels);
                            setLocalModel(validModels[0]);
                            openModal('alert', null, 'Éxito', `¡Conexión exitosa! Se encontraron ${validModels.length} modelos compatibles con tu clave. Haz clic en "Guardar Configuración" para aplicar.`, true);
                        } else {
                            setConfigError("Tu clave es válida, pero el proyecto de Google asociado no tiene habilitados los modelos de generation de texto.");

                    setConfigError("Error al conectar: " + err.message);

                setSavingConfig(false);
            };

                                                type="text"
                                                value={urlCurrYear}
                                                onChange={e => setUrlCurrYear(e.target.value)}

                                                type="text"

                                            {savingGithubUrl ? <div className="w-5 h-5 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <Save size={20} />}

                                    {sales.length > 0 && (
                                        <div className="mt-4 flex items-center gap-2 text-sm font-bold text-green-600 bg-green-50 w-fit px-4 py-2 rounded-lg border border-green-200">

                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'metas' && (
                        <div className="bg-white p-0 rounded-2xl shadow-sm border border-slate-100 animate-fadeIn overflow-hidden">

                            <div className="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-50">
                                <div>
                                    <h2 className="text-xl font-black text-blue-900 flex items-center gap-3 mb-1"><Target className="text-orange-500" /> Carga de Objetivos y Metas</h2>
                                    <p className="text-sm text-slate-500 font-medium">Añade metas manualmente o usa la plantilla de importación masiva.</p>
                                </div>

                                    <div className="flex items-center gap-2 mr-4 border-r border-slate-200 pr-4">

                                        <div className="relative">
                                            <input type="file" ref={metasInputRef} onChange={handleMetasFileSelect} accept=".xls,.xlsx,.csv" className="hidden" />
                                            <button onClick={handleMetasUploadClick} className="text-sm font-bold text-orange-700 hover:text-orange-900 bg-white border-2 border-orange-200 hover:border-orange-300 px-4 py-2 rounded-xl transition-all shadow-sm flex items-center gap-2" title="Subir plantilla completada">
                                                {metaUploadStatus === 'uploading' ? <div className="w-4 h-4 border-2 border-orange-300 border-t-orange-600 rounded-full animate-spin"></div> : <Upload size={16} />}

                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-2">
                                        <button onClick={handleSaveMetasMasivas} disabled={saveStatus === 'saving'} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-md flex items-center gap-2">

                                </div>

                            <div className="bg-white p-5 border-b border-slate-100 flex flex-wrap gap-6 items-center">
                                <div className="flex items-center gap-2">
                                    <select
                                        value={selectedNewVendedorForMeta}
                                        onChange={(e) => setSelectedNewVendedorForMeta(e.target.value)}

                                    >
                                        <option value="" disabled>Selecciona un Vendedor...</option>

                                            <option key={v.id} value={v.id}>{v.id} - {v.nombre}</option>

                                        onClick={handleAddVendedorRow}
                                        disabled={!selectedNewVendedorForMeta}

                                        <PlusCircle size={18} /> Añadir Marca

                                        <PlusCircle size={18} /> Añadir Subgrupo
                                    </button>
                                </div>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-50 text-slate-500 uppercase text-[10px] font-black tracking-wider border-b-2 border-slate-200">
                                        <tr>
                                            <th className="px-6 py-4 min-w-[280px] sticky left-0 bg-slate-50 shadow-[1px_0_0_#e2e8f0]">Vendedor (ID y Nombre)</th>

                                            <th className="px-4 py-4 bg-yellow-50/50 text-yellow-800"><Box size={14} className="inline mr-1" /> Cajas</th>
                                            <th className="px-4 py-4 bg-orange-50/50 text-orange-800"><Package size={14} className="inline mr-1" /> Unidades</th>
                                            <th className="px-4 py-4 bg-green-50/50 text-green-800 border-r border-slate-200"><Users size={14} className="inline mr-1" /> Clientes</th>
                                            {dynamicGroups.map(grupo => (
                                                <th key={grupo} className="px-4 py-4 border-r border-slate-200 group/header bg-white">
                                                    <div className="flex items-center justify-between gap-3">
                                                        <span className="text-slate-700">{grupo}</span>
                                                        <button onClick={() => openModal('deleteGroup', grupo, 'Eliminar Marca de Metas', `¿Estás seguro de eliminar la marca "${grupo}" de la tabla? Esto borrará las metas asignadas a esta marca para todos los vendedores.`)} className="text-slate-300 hover:text-red-500 transition-colors" title={`Eliminar grupo ${grupo}`}><X size={14} /></button>
                                                    </div>
                                                    <div className="flex gap-2 text-[10px] mt-2 font-bold text-slate-400 border-t border-slate-100 pt-1">
                                                        <span className="flex-1 text-center">MONTO ($)</span> <span className="flex-1 text-center">CAJAS (Cj)</span>
                                                    </div>
                                                </th>
                                            ))}
                                            {dynamicSubgroups.map(grupo => (
                                                <th key={`sg-${grupo}`} className="px-4 py-4 border-r border-slate-200 group/header bg-purple-50">
                                                    <div className="flex items-center justify-between gap-3">
                                                        <span className="text-purple-900 font-black">{grupo}</span>
                                                        <button onClick={() => openModal('deleteSubgroup', grupo, 'Eliminar Subgrupo de Metas', `¿Estás seguro de eliminar el subgrupo "${grupo}" de la tabla? Esto borrará las metas asignadas a este subgrupo para todos los vendedores.`)} className="text-purple-300 hover:text-red-500 transition-colors" title={`Eliminar subgrupo ${grupo}`}><X size={14} /></button>
                                                    </div>
                                                    <div className="flex gap-2 text-[10px] mt-2 font-bold text-purple-600 border-t border-purple-200 pt-1">
                                                        <span className="flex-1 text-center">MONTO ($)</span> <span className="flex-1 text-center">CAJAS (Cj)</span>
                                                    </div>
                                                </th>
                                            ))}
                                            <th className="px-6 py-4 text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">

                                                <td className="px-2 py-3 bg-blue-50/20 border-l border-slate-100">

                                                </td>
                                                <td className="px-2 py-3 bg-yellow-50/20">
                                                    <input type="text" value={vendedor.cajas === 0 || vendedor.cajas === undefined ? "" : vendedor.cajas} onChange={(e) => handleMetaChange(index, 'cajas', e.target.value)} placeholder="0" className="w-16 border-2 border-transparent hover:border-yellow-200 focus:border-yellow-500 rounded-lg p-2 outline-none bg-transparent focus:bg-white text-right font-black text-yellow-700 transition-all" />
                                                </td>
                                                <td className="px-2 py-3 bg-orange-50/20">
                                                    <input type="text" value={vendedor.unidades === 0 || vendedor.unidades === undefined ? "" : vendedor.unidades} onChange={(e) => handleMetaChange(index, 'unidades', e.target.value)} placeholder="0" className="w-20 border-2 border-transparent hover:border-orange-200 focus:border-orange-500 rounded-lg p-2 outline-none bg-transparent focus:bg-white text-right font-black text-orange-700 transition-all" />
                                                </td>
                                                <td className="px-2 py-3 bg-green-50/20 border-r border-slate-100">
                                                    <input type="text" value={vendedor.clientes === 0 || vendedor.clientes === undefined ? "" : vendedor.clientes} onChange={(e) => handleMetaChange(index, 'clientes', e.target.value)} placeholder="0" className="w-16 border-2 border-transparent hover:border-green-200 focus:border-green-500 rounded-lg p-2 outline-none bg-transparent focus:bg-white text-right font-black text-green-700 transition-all" />
                                                </td>
                                                {dynamicGroups.map(grupo => {
                                                    const grupoMonto = vendedor.grupos?.[grupo]?.monto;
                                                    const grupoCajas = vendedor.grupos?.[grupo]?.cajas;
                                                    return (
                                                        <td key={grupo} className="px-3 py-3 border-r border-slate-100 min-w-[180px]">
                                                            <div className="flex gap-2">
                                                                <input type="text" value={grupoMonto === 0 || grupoMonto === undefined ? "" : grupoMonto} onChange={(e) => handleMetaGrupoChange(index, grupo, 'monto', e.target.value)} placeholder="$ 0" className="w-full border-2 border-slate-100 hover:border-blue-300 focus:border-blue-500 rounded-lg p-2 outline-none bg-slate-50 focus:bg-white text-right transition-all font-bold text-slate-700" title={`Meta en Dólares para ${grupo}`} />
                                                                <input type="text" value={grupoCajas === 0 || grupoCajas === undefined ? "" : grupoCajas} onChange={(e) => handleMetaGrupoChange(index, grupo, 'cajas', e.target.value)} placeholder="Cj 0" className="w-full border-2 border-slate-100 hover:border-yellow-300 focus:border-yellow-500 rounded-lg p-2 outline-none bg-slate-50 focus:bg-white text-right transition-all font-bold text-slate-700" title={`Meta en Cajas para ${grupo}`} />
                                                            </div>
                                                        </td>
                                                    );
                                                })}
                                                {dynamicSubgroups.map(grupo => {
                                                    const grupoMonto = vendedor.subgrupos?.[grupo]?.monto;
                                                    const grupoCajas = vendedor.subgrupos?.[grupo]?.cajas;
                                                    return (
                                                        <td key={`sg-${grupo}`} className="px-3 py-3 border-r border-slate-100 min-w-[180px] bg-purple-50/30">
                                                            <div className="flex gap-2">
                                                                <input type="text" value={grupoMonto === 0 || grupoMonto === undefined ? "" : grupoMonto} onChange={(e) => handleMetaSubgrupoChange(index, grupo, 'monto', e.target.value)} placeholder="$ 0" className="w-full border-2 border-purple-100 hover:border-purple-300 focus:border-purple-500 rounded-lg p-2 outline-none bg-white text-right transition-all font-bold text-slate-700" title={`Meta en Dólares para ${grupo}`} />
                                                                <input type="text" value={grupoCajas === 0 || grupoCajas === undefined ? "" : grupoCajas} onChange={(e) => handleMetaSubgrupoChange(index, grupo, 'cajas', e.target.value)} placeholder="Cj 0" className="w-full border-2 border-purple-100 hover:border-purple-300 focus:border-purple-500 rounded-lg p-2 outline-none bg-white text-right transition-all font-bold text-slate-700" title={`Meta en Cajas para ${grupo}`} />
                                                            </div>
                                                        </td>
                                                    );
                                                })}
                                                <td className="px-6 py-3 text-center">
                                                    <button onClick={() => openModal('deleteMetaRow', vendedor.id, 'Eliminar de la Tabla', `¿Estás seguro de quitar a este vendedor de la tabla de asignación de metas? Esto borrará sus metas asignadas de la base de datos.`)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Quitar de la lista"><Trash2 size={18} /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {metasMasivas.length === 0 && (
                                    <div className="p-16 text-center text-slate-500 font-medium">
                                        <Target size={40} className="mx-auto mb-4 text-slate-300" />
                                        Ningún vendedor en la tabla. Usa el selector de arriba para añadir uno.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* --- PESTAÑA 3: GESTIÓN DE USUARIOS --- */}
                    {activeTab === 'usuarios' && (

                                <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-4">
                                    <h2 className="text-xl font-black text-blue-900 flex items-center gap-3">
                                        {editingUserId ? <Edit2 className="text-orange-500" /> : <UserPlus className="text-orange-500" />}
                                        {editingUserId ? 'Editar Perfil de Usuario' : 'Registrar Nuevo Usuario'}

                                    <div className="flex items-center gap-4">

                                            <button onClick={() => { setEditingUserId(null); setUserForm({ nombre: "", idPersonal: "", email: "", password: "", rol: "vendedor", supervisor: "" }); }} className="text-sm font-bold text-slate-500 hover:text-slate-800 flex items-center gap-1 bg-slate-100 px-4 py-2 rounded-xl transition-colors">
                                                <X size={16} /> Cancelar Edición
                                            </button>
                                        )}
                                        {userSaveStatus === 'success' && (
                                            <span className="bg-green-50 text-green-600 px-4 py-2 rounded-xl text-sm font-black flex items-center gap-2 border border-green-200 shadow-sm animate-pulse">
                                                <CheckCircle2 size={18} /> {editingUserId ? 'Usuario Actualizado' : 'Usuario Creado Exitosamente'}
                                            </span>
                                        )}
                                    </div>
                                </div>

                                <form onSubmit={handleSaveUser} className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nombre Completo</label>
                                            <input type="text" required placeholder="Ej: Juan Pérez" value={userForm.nombre} onChange={(e) => setUserForm({ ...userForm, nombre: e.target.value })} className="w-full border-2 border-slate-200 hover:border-blue-300 focus:border-blue-600 rounded-xl p-3.5 outline-none bg-slate-50 focus:bg-white transition-all font-medium text-slate-800" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ID Personal (Código de Vendedor)</label>
                                            <input type="text" required placeholder="Ej: 052, 089..." value={userForm.idPersonal} onChange={(e) => setUserForm({ ...userForm, idPersonal: e.target.value })} className="w-full border-2 border-slate-200 hover:border-blue-300 focus:border-blue-600 rounded-xl p-3.5 outline-none bg-slate-50 focus:bg-white transition-all font-medium text-slate-800" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 bg-blue-50/50 p-6 rounded-2xl border border-blue-100">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Correo Electrónico (Opcional)</label>
                                            <input type="email" placeholder="juan@comaca.com" value={userForm.email} onChange={(e) => setUserForm({ ...userForm, email: e.target.value })} className="w-full border-2 border-slate-200 hover:border-blue-300 focus:border-blue-600 rounded-xl p-3.5 outline-none bg-white transition-all font-medium text-slate-800" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Contraseña Permanente</label>

                                                <input type="text" required={!editingUserId} placeholder={editingUserId ? "Dejar en blanco para no cambiar" : "Mínimo 6 caracteres"} value={userForm.password} onChange={(e) => setUserForm({ ...userForm, password: e.target.value })} className="w-full border-2 border-slate-200 hover:border-blue-300 focus:border-blue-600 rounded-xl p-3.5 pl-11 outline-none bg-white transition-all font-medium text-slate-800" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Rol en la Plataforma</label>
                                            <select value={userForm.rol} onChange={(e) => setUserForm({ ...userForm, rol: e.target.value })} className="w-full border-2 border-slate-200 hover:border-blue-300 focus:border-blue-600 rounded-xl p-3.5 outline-none bg-slate-50 focus:bg-white transition-all font-medium text-slate-800 cursor-pointer">
                                                <option value="vendedor">Vendedor de Ruta</option>
                                                <option value="gerente">Gerente / Supervisor</option>
                                                <option value="admin">Administrador del Sistema</option>
                                            </select>
                                        </div>
                                        {userForm.rol === 'vendedor' && (
                                            <div className="animate-fadeIn">
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Asignar a Supervisor</label>
                                                <select required value={userForm.supervisor} onChange={(e) => setUserForm({ ...userForm, supervisor: e.target.value })} className="w-full border-2 border-orange-200 hover:border-orange-400 focus:border-orange-500 rounded-xl p-3.5 outline-none bg-orange-50 focus:bg-white transition-all font-bold text-orange-900 cursor-pointer">
                                                    <option value="" disabled>Seleccione un supervisor...</option>
                                                    {users.filter(u => u.rol === 'gerente').map(g => (
                                                        <option key={g.id} value={g.id}>{g.nombre} (ID: {g.id})</option>
                                                    ))}
                                                </select>
                                            </div>
                                        )}
                                    </div>
                                    {userForm.rol === 'vendedor' && (() => {
                                        const listasDisponiblesAdmin = [...new Set((precios || []).map(p => p.lista).filter(Boolean))];
                                        return listasDisponiblesAdmin.length > 0 ? (
                                            <div className="bg-indigo-50/70 border border-indigo-100 rounded-2xl p-6 animate-fadeIn">
                                                <h4 className="font-black text-sm text-indigo-900 mb-4 flex items-center gap-2"><Tag size={16} className="text-indigo-500" /> Configuración de Listas de Precios</h4>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Lista de Precios Base (por defecto)</label>
                                                        <select value={userForm.listaBase} onChange={(e) => setUserForm({ ...userForm, listaBase: e.target.value })} className="w-full border-2 border-indigo-200 hover:border-indigo-400 focus:border-indigo-600 rounded-xl p-3.5 outline-none bg-white transition-all font-medium text-slate-800 cursor-pointer">
                                                            <option value="">— Sin lista base (usa la primera disponible) —</option>
                                                            {listasDisponiblesAdmin.map(l => <option key={l} value={l}>{l}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Listas de Precios Visibles</label>
                                                        <div className="space-y-2 max-h-40 overflow-y-auto border-2 border-indigo-100 rounded-xl p-3 bg-white">
                                                            {listasDisponiblesAdmin.map(l => (
                                                                <label key={l} className="flex items-center gap-3 cursor-pointer hover:bg-indigo-50 rounded-lg p-1.5 transition-colors">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={(userForm.listasVisibles || []).includes(l)}
                                                                        onChange={(e) => {
                                                                            const newList = e.target.checked
                                                                                ? [...(userForm.listasVisibles || []), l]
                                                                                : (userForm.listasVisibles || []).filter(x => x !== l);
                                                                            setUserForm({ ...userForm, listasVisibles: newList });
                                                                        }}
                                                                        className="w-4 h-4 rounded accent-indigo-600"
                                                                    />
                                                                    <span className="text-sm font-semibold text-slate-700">{l}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                        <p className="text-[10px] text-slate-400 mt-1.5 font-medium">Si no marcas ninguna, el vendedor verá todas las listas.</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : null;
                                    })()}
                                    <div className="pt-6 border-t border-slate-100 flex justify-end">
                                        <button type="submit" disabled={userSaveStatus === 'saving'} className="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-10 py-3.5 rounded-xl font-black transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-3">
                                            {userSaveStatus === 'saving' ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : (editingUserId ? <Save size={20} /> : <UserPlus size={20} />)}
                                            {editingUserId ? 'Guardar Cambios' : 'Registrar Nuevo Usuario'}
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                                <div className="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="font-black text-lg text-slate-800 flex items-center gap-3"><Users className="text-blue-600" /> Directorio de Usuarios</h3>
                                    <span className="bg-white border border-slate-200 text-slate-600 px-3 py-1 rounded-lg text-xs font-bold shadow-sm">{users.length} Registrados</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-white text-slate-400 uppercase text-[10px] font-black tracking-wider border-b-2 border-slate-100">
                                            <tr>
                                                <th className="px-6 py-4">Usuario</th>
                                                <th className="px-6 py-4">Código (ID)</th>
                                                <th className="px-6 py-4">Rol Asignado</th>
                                                <th className="px-6 py-4 text-right">Gestión</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {users.map((u) => (
                                                <tr key={u.id} className="hover:bg-blue-50/30 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-slate-800 flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-black text-xs shrink-0">{u.nombre.charAt(0)}</div>
                                                        {u.nombre}
