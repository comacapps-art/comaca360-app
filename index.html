                                                        <tr key={idx} className="hover:bg-slate-50">
                                                            <td className="px-4 py-2 font-mono text-slate-700 font-medium">{fac.numero}</td>
                                                            <td className="px-4 py-2 text-slate-500">{fac.fecha}</td>
                                                            <td className="px-4 py-2 text-right text-slate-400">${Number(fac.monto).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                                            <td className="px-4 py-2 text-right font-black text-red-600">${Number(fac.saldo).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                                        </tr>
                                                    ));
                                                })()}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-slate-100 bg-slate-50 shrink-0 text-right">
                                    <button onClick={() => setShowDebtDetail(false)} className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl text-sm transition-colors">
                                        Cerrar Detalle
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // --- VENDEDOR DASHBOARD ---
        const PedidosVendedorDashboard = ({ currentUser, cartera, catalog, precios, pedidos, cxc, openModal }) => {
            const [activeTab, setActiveTab] = useState('cartera');
            const [searchCliente, setSearchCliente] = useState('');
            const [clientForOrder, setClientForOrder] = useState(null);
            const [expandedClienteCxc, setExpandedClienteCxc] = useState(null);

            // Nuevos estados para filtros de pedidos
            const [searchPedidoCliente, setSearchPedidoCliente] = useState('');
            const [pedidoStartDate, setPedidoStartDate] = useState('');
            const [pedidoEndDate, setPedidoEndDate] = useState('');
            const [filtroEstadoPedido, setFiltroEstadoPedido] = useState('ALL');

            const miCartera = useMemo(() => {
                let list = (currentUser.rol === 'admin' || currentUser.rol === 'gerente')
                    ? cartera // Admin y Gerente ven toda la cartera completa
                    : cartera.filter(c => normalizeId(c.idVendedor) === normalizeId(currentUser.id) || (c.vendedorNombre || '').includes(currentUser.id));
                if (searchCliente) list = list.filter(c => (c.cliente || '').toLowerCase().includes(searchCliente.toLowerCase()));

                return list.map(c => {
                    const cxcMatch = cxc.find(d =>
                        d.rawCliente === c.cliente ||
                        d.clienteNombre === c.cliente ||
                        (d.idCliente && c.cliente.includes(d.idCliente)) ||
                        (d.rawCliente && d.rawCliente.includes(c.cliente))
                    );
                    return { ...c, deuda: cxcMatch ? cxcMatch.deuda : 0 };
                });
            }, [cartera, currentUser, searchCliente, cxc]);

            const miCxcDetallado = useMemo(() => {
                return cxc.filter(d => 
                    miCartera.some(c => 
                        d.rawCliente === c.cliente ||
                        d.clienteNombre === c.cliente ||
                        (d.idCliente && c.cliente.includes(d.idCliente)) ||
                        (d.rawCliente && d.rawCliente.includes(c.cliente))
                    )
                );
            }, [cxc, miCartera]);

            const misPedidos = useMemo(() => {
                return pedidos.slice().filter(p => {
                    // Todos los roles (vendedor, admin, gerente) ven únicamente los pedidos creados por ellos mismos (idéntico al vendedorId firmado).
                    if (p.vendedorId !== currentUser.id) return false;
                    if (filtroEstadoPedido !== 'ALL' && (p.estado || 'Pendiente') !== filtroEstadoPedido) return false;
                    if (searchPedidoCliente && !(p.clienteNombre || '').toLowerCase().includes(searchPedidoCliente.toLowerCase())) return false;
                    if (pedidoStartDate || pedidoEndDate) {
                        const orderDate = new Date(p.fecha);
                        if (isNaN(orderDate.getTime())) return false;
                        if (pedidoStartDate && orderDate < new Date(pedidoStartDate + 'T00:00:00')) return false;
                        if (pedidoEndDate && orderDate > new Date(pedidoEndDate + 'T23:59:59')) return false;
                    }
                    return true;
                }).sort((a, b) => safeGetTime(b.fecha) - safeGetTime(a.fecha));
            }, [pedidos, currentUser, searchPedidoCliente, pedidoStartDate, pedidoEndDate, filtroEstadoPedido]);

            if (clientForOrder) {
                return <TomaPedidosView currentUser={currentUser} client={clientForOrder} goBack={() => setClientForOrder(null)} catalog={catalog} precios={precios} cxc={cxc} openModal={openModal} />;
            }

            return (
                <div className="space-y-6 animate-fadeIn p-4 md:p-8">
                    <div className="bg-white p-2 rounded-xl shadow-sm border border-slate-100 flex gap-2 overflow-x-auto">
                        <button onClick={() => setActiveTab('cartera')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'cartera' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <MapPin size={18} /> Mi Ruta (Clientes)
                        </button>
                        <button onClick={() => setActiveTab('pedidos')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'pedidos' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <Receipt size={18} /> Historial de Pedidos
                        </button>
                        <button onClick={() => setActiveTab('cxc')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'cxc' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <Wallet size={18} /> Cuentas por Cobrar
                        </button>
                    </div>

                    {activeTab === 'cartera' && (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                            <div className="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h3 className="font-black text-xl flex items-center gap-3">
                                        <BookOpen size={24} className="text-orange-400" /> Selecciona un Cliente
                                    </h3>
                                    <p className="text-sm text-blue-200 mt-1 font-medium">Busca el cliente a visitar y haz clic en "Tomar Pedido".</p>
                                </div>
                                <div className="relative w-full md:w-auto">
                                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input
                                        type="text" placeholder="Buscar cliente..." value={searchCliente} onChange={e => setSearchCliente(e.target.value)}
                                        className="w-full md:w-64 pl-10 pr-4 py-2.5 bg-white/10 border border-white/20 focus:bg-white focus:text-slate-800 text-white placeholder-white/60 rounded-xl outline-none transition-all font-medium"
                                    />
                                </div>
                            </div>

                            <div className="p-6 bg-slate-50 min-h-[400px]">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {miCartera.map((c, idx) => (
                                        <div key={idx} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all hover:border-blue-300 flex flex-col relative overflow-hidden">
                                            {c.deuda > 0 && <div className="absolute top-0 right-0 w-16 h-16 overflow-hidden">
                                                <div className="bg-red-500 text-white text-[9px] font-black uppercase tracking-wider text-center py-1 absolute transform rotate-45 top-3 -right-5 w-24 shadow-md">
                                                    Deuda
                                                </div>
                                            </div>}
                                            <div className="flex items-start gap-3 mb-4 pr-6">
                                                <div className="p-3 bg-blue-50 text-blue-600 rounded-xl shrink-0"><Users size={20} /></div>
                                                <p className="font-black text-slate-800 text-sm leading-tight flex-1">{c.cliente}</p>
                                            </div>
                                            {c.deuda > 0 && (
                                                <div className="mb-4 p-2 bg-red-50 border border-red-100 rounded-lg flex items-center gap-2 text-red-600">
                                                    <AlertCircle size={14} />
                                                    <span className="text-xs font-black">Deuda: ${c.deuda.toLocaleString(undefined, { minimumFractionDigits: 2 })}</span>
                                                </div>
                                            )}
                                            <button
                                                onClick={() => setClientForOrder(c)}
                                                className="mt-auto w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors shadow-sm flex justify-center items-center gap-2"
                                            >
                                                <ShoppingCart size={18} /> Tomar Pedido
                                            </button>
                                        </div>
                                    ))}
                                </div>
                                {miCartera.length === 0 && (
                                    <div className="flex flex-col items-center justify-center py-20 text-slate-400">
                                        <MapPin size={48} className="mb-4 opacity-30" />
                                        <p className="font-medium">No se encontraron clientes en tu ruta.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'pedidos' && (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                            <div className="bg-slate-50 p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                <div>
                                    <h3 className="font-black text-lg text-blue-900 flex items-center gap-3"><Receipt className="text-orange-500" /> Mis Pedidos Realizados</h3>
                                    <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold mt-2 inline-block">{misPedidos.length} Pedidos</span>
                                </div>
                                <div className="flex flex-wrap items-center gap-2 w-full md:w-auto">
                                    <div className="relative flex-1 min-w-[180px]">
                                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                                        <input

                    )}

                    {activeTab === 'cxc' && (
                        <div className="space-y-6 animate-fadeIn">

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {miCxcDetallado.map((d, idx) => (

                                        <div 
                                            className="p-4 cursor-pointer hover:bg-slate-50 transition-colors flex justify-between items-center"

                                                {d.facturas && d.facturas.length > 0 && <span className="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full mt-1 inline-block">{d.facturas.length} docs</span>}

                                        {expandedClienteCxc === d.id && d.facturas && d.facturas.length > 0 && (

                                        No hay cuentas por cobrar en tu ruta actualmente.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // --- ADMIN PANEL ---
        const PedidosAdminPanel = ({ currentUser, users, cartera, catalog, precios, pedidos, cxc, openModal, db, getCollectionPath }) => {
            const [activeTab, setActiveTab] = useState('pedidos');

            // Estados para Gestión de un Pedido Específico
            const [managingPedido, setManagingPedido] = useState(null);
            
            // Estado para Impresión Masiva
            const [selectedPedidos, setSelectedPedidos] = useState([]);
            const [showBulkPrint, setShowBulkPrint] = useState(false);
            const [expandedCxc, setExpandedCxc] = useState(null);

            // Filtros para Pedidos Globales
            const [searchPedidoAdmin, setSearchPedidoAdmin] = useState('');
            const [pedidoStartDateAdmin, setPedidoStartDateAdmin] = useState('');
            const [pedidoEndDateAdmin, setPedidoEndDateAdmin] = useState('');
            const [filtroVendedorAdmin, setFiltroVendedorAdmin] = useState('ALL');
            const [filtroEstadoAdmin, setFiltroEstadoAdmin] = useState('ALL');

            const filteredPedidosAdmin = useMemo(() => {
                let basePedidos = pedidos.slice();
                if (currentUser && currentUser.rol === 'gerente') {
                    basePedidos = basePedidos.filter(p => {
                        const seller = users.find(u => u.id === p.vendedorId);
                        return seller && seller.supervisor === currentUser.id;
                    });
                }
                
                return basePedidos.filter(p => {
                    if (filtroVendedorAdmin !== 'ALL' && p.vendedorId !== filtroVendedorAdmin) return false;
                    if (filtroEstadoAdmin !== 'ALL' && (p.estado || 'Pendiente') !== filtroEstadoAdmin) return false;
                    if (searchPedidoAdmin && !(p.clienteNombre || '').toLowerCase().includes(searchPedidoAdmin.toLowerCase()) && !(p.vendedorNombre || '').toLowerCase().includes(searchPedidoAdmin.toLowerCase())) return false;
                    if (pedidoStartDateAdmin || pedidoEndDateAdmin) {
                        const orderDate = new Date(p.fecha);
                        if (isNaN(orderDate.getTime())) return false;
                        if (pedidoStartDateAdmin && orderDate < new Date(pedidoStartDateAdmin + 'T00:00:00')) return false;
                        if (pedidoEndDateAdmin && orderDate > new Date(pedidoEndDateAdmin + 'T23:59:59')) return false;
                    }
                    return true;
                }).sort((a, b) => safeGetTime(b.fecha) - safeGetTime(a.fecha));
            }, [pedidos, currentUser, users, searchPedidoAdmin, pedidoStartDateAdmin, pedidoEndDateAdmin, filtroVendedorAdmin, filtroEstadoAdmin]);

            const vendedoresUnicos = useMemo(() => {
                const mapIds = new Map();
                pedidos.forEach(p => {
                    if (!mapIds.has(p.vendedorId)) mapIds.set(p.vendedorId, p.vendedorNombre);
                });
                return Array.from(mapIds.entries()).map(([id, nombre]) => ({ id, nombre }));
            }, [pedidos]);

            // Estados para URLs de GitHub Sync
            const [catalogUrl, setCatalogUrl] = useState('');
            const [preciosUrl, setPreciosUrl] = useState('');
            const [cxcUrl, setCxcUrl] = useState('');
            const [carteraUrl, setCarteraUrl] = useState('');

            // Estados para Cargas
            const [isUploadingCatalog, setIsUploadingCatalog] = useState(false);
            const [isUploadingPrecios, setIsUploadingPrecios] = useState(false);
            const [isUploadingCxc, setIsUploadingCxc] = useState(false);
            const [isUploadingCartera, setIsUploadingCartera] = useState(false);

            const [nombreLista, setNombreLista] = useState('');
            const [adminPreviewLista, setAdminPreviewLista] = useState('');

            const catalogInputRef = useRef(null);
            const preciosInputRef = useRef(null);
            const cxcInputRef = useRef(null);
            const carteraInputRef = useRef(null);

            const listasDisponibles = useMemo(() => [...new Set(precios.map(p => p.lista).filter(Boolean))], [precios]);

            useEffect(() => {
                if (!adminPreviewLista && listasDisponibles.length > 0) setAdminPreviewLista(listasDisponibles[0]);
            }, [listasDisponibles, adminPreviewLista]);

            const catalogWithAdminPrices = useMemo(() => {
                return catalog.map(prod => {
                    const priceItem = precios.find(p => p.sku === prod.sku && p.lista === adminPreviewLista);
                    return {
                        ...prod,
                        precio: priceItem ? priceItem.precio : 0,
                        precioCaja: priceItem ? priceItem.precioCaja : 0,
                        precioUnd: priceItem ? priceItem.precioUnd : 0,
                        und: priceItem ? priceItem.und : 0
                    };
                });
            }, [catalog, precios, adminPreviewLista]);

            // Estados para Usuarios
            const [userForm, setUserForm] = useState({ nombre: "", idPersonal: "", password: "", rol: "vendedor" });
            const [editingUserId, setEditingUserId] = useState(null);
            const [userSaveStatus, setUserSaveStatus] = useState('idle');

            const handleDownloadPlantillaCatalogo = () => {
                const headerHtml = `<th>SKU</th><th>NOMBRE</th><th>MARCA</th>`;
                const sampleRowHtml = `<td>155</td><td>OREO CHOCOLATE TUBO 56X 108 GR</td><td>NABISCO</td>`;
                const tableHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${headerHtml}</tr></thead><tbody><tr>${sampleRowHtml}</tr></tbody></table></body></html>`;
                const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = "plantilla_catalogo_base.xls";
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleDownloadPlantillaPrecios = () => {
                const headerHtml = `<th>CODIGO</th><th>DESCRIPCION</th><th>UND</th><th>PRECIO CAJA</th><th>PRECIO UND</th>`;
                const sampleRowHtml = `<td>155</td><td>OREO CHOCOLATE TUBO 56X 108 GR</td><td>56</td><td>75.43</td><td>1.35</td>`;
                const tableHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${headerHtml}</tr></thead><tbody><tr>${sampleRowHtml}</tr></tbody></table></body></html>`;
                const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = "plantilla_lista_precios.xls";
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleDownloadPlantillaCxc = () => {
                const headerHtml = `<th>Id Cliente</th><th>Cliente</th><th>Fecha</th><th>Numero</th><th>Cajas</th><th>Kgs/Lts</th><th>Monto</th><th>Saldo</th>`;
                const sampleRowHtml = `<td>000341</td><td>DARILENE JOSEFINA SANDREA RIVERO</td><td>2026-04-08</td><td>N00032259</td><td>0,00</td><td>0,00</td><td>59,51</td><td>59,51</td>`;
                const tableHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${headerHtml}</tr></thead><tbody><tr>${sampleRowHtml}</tr></tbody></table></body></html>`;
                const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
                const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = "plantilla_cxc_deudas.xls";
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            // --- FUNCIÓN UNIFICADA DE PROCESAMIENTO DE EXCEL/CSV ---
            const processExcelBuffer = async (arrayBuffer, type, extraParam) => {
                const data = new Uint8Array(arrayBuffer);
                const workbook = window.XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const rows = window.XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                if (type === 'catalog') {
                    const newCatalog = rows.map(row => {
                        const skuVal = getSafeVal(row, ['SKU', 'CODIGO', 'ID']);
                        const nombreVal = getSafeVal(row, ['NOMBRE', 'PRODUCTO', 'DESCRIPCION', 'ARTICULO']);
                        const marcaVal = getSafeVal(row, ['MARCA', 'LINEA', 'GRUPO', 'CATEGORIA']);
                        return {
                            sku: skuVal ? String(skuVal).trim() : '',
                            nombre: nombreVal ? String(nombreVal).trim().toUpperCase() : '',
                            marca: marcaVal ? String(marcaVal).trim().toUpperCase() : 'GENERAL'
                        };
                    }).filter(p => p.sku && p.nombre);

                    if (newCatalog.length === 0) throw new Error('El archivo está vacío o no se encontraron las columnas correctas.');

                    const chunksDelete = chunkArray(catalog, 450);
                    await Promise.all(chunksDelete.map(chunk => {
                        const batch = writeBatch(db);
                        chunk.forEach(p => { if (p.id) batch.delete(doc(db, getCollectionPath('productos'), p.id)); });
                        return batch.commit();
                    }));

                    await uploadInBatches(newCatalog, 'productos');
                    return `Se cargó la base de ${newCatalog.length} productos correctamente.`;
                }
                else if (type === 'precios') {
                    const listaName = extraParam;
                    const newPrecios = rows.map(row => {
                        const sku = String(getSafeVal(row, ['CODIGO', 'SKU', 'ID']) || '').trim();
                        const precioUnd = parseNum(getSafeVal(row, ['PRECIO UND', 'PRECIO UNIDAD', 'PRECIO UNITARIO', 'PRECIO', 'PRICE', 'PRECIOUND']));
                        const precioCaja = parseNum(getSafeVal(row, ['PRECIO CAJA', 'CAJA', 'PRECIOCAJA']));
                        const und = parseNum(getSafeVal(row, ['UND', 'UNIDADES', 'CANTIDAD', 'PZAS']));

                        return {
                            id: `${listaName}_${sku}`,
                            lista: listaName,
                            sku: sku,
                            precio: precioUnd > 0 ? precioUnd : precioCaja,
                            precioUnd: precioUnd,
                            precioCaja: precioCaja,
                            und: und
                        };
                    }).filter(p => p.sku && p.precio > 0);

                    if (newPrecios.length === 0) throw new Error('No se encontraron las columnas de Código y Precio en el archivo.');

                    const oldPreciosThisList = precios.filter(p => p.lista === listaName);
                    const chunksDelete = chunkArray(oldPreciosThisList, 450);
                    await Promise.all(chunksDelete.map(chunk => {
                        const batch = writeBatch(db);
                        chunk.forEach(p => { if (p.id) batch.delete(doc(db, getCollectionPath('precios'), p.id)); });
                        return batch.commit();
                    }));

                    await uploadInBatches(newPrecios, 'precios', 'id');
                    return `Se actualizaron ${newPrecios.length} precios de la lista "${listaName}".`;
                }
                else if (type === 'cxc') {
                    const clientsMap = {};
                    rows.forEach((row, index) => {
                        const idC = String(getSafeVal(row, ['Id Cliente', 'ID', 'Codigo']) || '').trim();
                        const nomC = String(getSafeVal(row, ['Cliente', 'Nombre', 'Razon Social']) || '').trim();
                        const fecha = String(getSafeVal(row, ['Fecha', 'Emision', 'Date']) || '').trim();
                        const numero = String(getSafeVal(row, ['Numero', 'Documento', 'Factura']) || '').trim();
                        const monto = parseNum(getSafeVal(row, ['Monto', 'Original', 'Total']));
                        const saldo = parseNum(getSafeVal(row, ['Saldo', 'Deuda', 'Pendiente']));

                        if (!idC || saldo <= 0) return;

                        if (!clientsMap[idC]) {
                            clientsMap[idC] = {
                                id: `cxc_${index}_${normalizeId(idC)}`,
                                rawCliente: `${idC}-${nomC}`,
                                idCliente: idC,
                                clienteNombre: nomC,
                                deuda: 0,
                                facturas: []
                            };
                        }

                        clientsMap[idC].deuda += saldo;
                        clientsMap[idC].facturas.push({
                            numero,
                            fecha,
                            monto,
                            saldo
                        });
                    });

                    const newCxc = Object.values(clientsMap);

                    if (newCxc.length === 0) throw new Error('El archivo no contiene la información con las columnas correctas (Id Cliente, Cliente, Fecha, Numero, Monto, Saldo).');

                    const chunksDelete = chunkArray(cxc, 450);
                    await Promise.all(chunksDelete.map(chunk => {
                        const batch = writeBatch(db);
                        chunk.forEach(c => { if (c.id) batch.delete(doc(db, getCollectionPath('cxc'), c.id)); });
                        return batch.commit();
                    }));

                    await uploadInBatches(newCxc, 'cxc', 'id');
                    return `Se cargaron las deudas CXC de ${newCxc.length} clientes.`;
                }
                else if (type === 'cartera') {
                    const newCartera = rows.map(row => {
                        const vVal = getSafeVal(row, ['VENDEDOR', 'VENDEDORES', 'ID VENDEDOR', 'RUTA']);
                        const cVal = getSafeVal(row, ['CLIENTE', 'CLIENTES', 'NOMBRE', 'RAZON SOCIAL']);
                        const vStr = vVal ? String(vVal).trim() : '';
                        const p = vStr.split('-');
                        const idV = p[0].trim();
                        const nomV = p.slice(1).join('-').trim() || vStr;
                        return {
                            idVendedor: idV,
                            vendedorNombre: nomV,
                            cliente: cVal ? String(cVal).trim() : 'Desconocido'
                        };
                    }).filter(c => c.cliente && c.cliente !== 'Desconocido' && c.idVendedor);

                    if (newCartera.length === 0) throw new Error('El archivo no contiene la información con las columnas correctas.');

                    const chunksDelete = chunkArray(cartera, 450);
                    await Promise.all(chunksDelete.map(chunk => {
                        const batch = writeBatch(db);
                        chunk.forEach(c => { if (c.firebaseId) batch.delete(doc(db, getCollectionPath('cartera'), c.firebaseId)); });
                        return batch.commit();
                    }));
                    await uploadInBatches(newCartera, 'cartera');
                    return `Rutas actualizadas con ${newCartera.length} clientes.`;
                }
            };

            const handleFileUpload = async (e, type, extraParam = null) => {
                const file = e.target.files[0];
                if (!file) return;

                const setLoad = type === 'catalog' ? setIsUploadingCatalog :
                    type === 'precios' ? setIsUploadingPrecios :
                        type === 'cxc' ? setIsUploadingCxc : setIsUploadingCartera;

                setLoad(true);
                try {
                    const buffer = await file.arrayBuffer();
                    const msg = await processExcelBuffer(buffer, type, extraParam);
                    openModal('alert', null, 'Éxito', msg, true);
                } catch (err) {
                    console.error(err);
                    openModal('alert', null, 'Error', err.message, true);
                }
                setLoad(false);
                if (e.target) e.target.value = null;
            };

            const handleUrlUpload = async (url, type, extraParam = null) => {
                if (!url) {
                    openModal('alert', null, 'Error', 'Ingresa un enlace válido.', true);
                    return;
                }

                const setLoad = type === 'catalog' ? setIsUploadingCatalog :
                    type === 'precios' ? setIsUploadingPrecios :
                        type === 'cxc' ? setIsUploadingCxc : setIsUploadingCartera;

                setLoad(true);
                try {
                    let cleanUrl = url.trim();
                    if (cleanUrl.includes('github.com') && cleanUrl.includes('/blob/')) {
                        cleanUrl = cleanUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                    }

                    const res = await fetch(cleanUrl + (cleanUrl.includes('?') ? '&' : '?') + 't=' + new Date().getTime());
                    if (!res.ok) throw new Error("No se pudo descargar el archivo desde el enlace.");

                    const buffer = await res.arrayBuffer();
                    const msg = await processExcelBuffer(buffer, type, extraParam);
                    openModal('alert', null, 'Éxito', msg, true);
                } catch (err) {
                    console.error(err);
                    openModal('alert', null, 'Error', err.message, true);
                }
                setLoad(false);
            };

            const handleSaveUser = async (e) => {
                e.preventDefault(); setUserSaveStatus('saving');
                try {
                    const idToSave = editingUserId || userForm.idPersonal;
                    const userPayload = { ...userForm, id: idToSave };
                    await setDoc(doc(db, getCollectionPath('users'), idToSave), userPayload);
                    setUserSaveStatus('success');
                    setUserForm({ nombre: "", idPersonal: "", password: "", rol: "vendedor" });
                    setEditingUserId(null);
                } catch (err) { console.error(err); }
                setTimeout(() => setUserSaveStatus('idle'), 3000);
            };

            return (
                <div className="space-y-6 animate-fadeIn p-4 md:p-8 relative">
                    {managingPedido && (
                        <GestorPedidoModal
                            pedido={managingPedido}
                            precios={precios}
                            cxc={cxc}
                            onClose={() => setManagingPedido(null)}
                            db={db}
                            getCollectionPath={getCollectionPath}
                            openModal={openModal}
                        />
                    )}

                    {showBulkPrint && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm print-modal">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col print-scroll-reset">
                                <div className="p-4 border-b border-slate-200 flex justify-between items-center shrink-0 bg-white rounded-t-2xl print-hide">
                                    <h2 className="text-lg font-black text-blue-900 flex items-center gap-2"><Printer className="text-orange-500" /> Impresión Masiva de Pedidos</h2>
                                    <div className="flex items-center gap-3">
                                        <button 
                                            onClick={() => {
                                                if (!window.html2pdf) { openModal('alert', null, 'Error', 'El módulo de impresión aún se está cargando.', true); return; }
                                                const element = document.getElementById('bulk-print-container');
                                                const opt = {
                                                    margin: 0.2,
                                                    filename: `Pedidos_Masivos_${new Date().getTime()}.pdf`,
                                                    image: { type: 'jpeg', quality: 0.98 },
                                                    html2canvas: { scale: 2, useCORS: true, logging: false },
                                                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                                                };
                                                window.html2pdf().set(opt).from(element).save();
                                            }} 
                                            className="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl flex items-center gap-2 transition-colors shadow-sm text-sm"
                                        >
                                            <Printer size={16} /> Generar PDF
                                        </button>
                                        <button onClick={() => setShowBulkPrint(false)} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><X size={18} /></button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto bg-slate-100 print-scroll-reset p-4">
                                    <div id="bulk-print-container" className="grid grid-cols-2 gap-4 bg-white p-4">
                                        {pedidos.filter(p => selectedPedidos.includes(p.id)).map((pedido, idx) => (
                                            <div key={idx} className="border border-slate-300 p-2 text-xs flex flex-col page-break-inside-avoid" style={{ pageBreakInside: 'avoid' }}>
                                                <div className="border-b border-slate-300 pb-1 mb-1 flex justify-between items-start">
                                                    <div className="min-w-0 pr-2">
                                                        <div className="font-black text-[11px] text-slate-800 truncate" title={pedido.clienteNombre}>{pedido.clienteNombre}</div>
                                                        <div className="text-[9px] text-slate-600 truncate">Vend: {pedido.vendedorNombre}</div>
                                                    </div>
                                                    <div className="text-right shrink-0">
                                                        <div className="font-bold text-[9px]">{safeFormatDate(pedido.fecha)}</div>
                                                        <div className="text-[9px] font-bold text-slate-500 uppercase">{pedido.listaPrecio}</div>
                                                    </div>
                                                </div>
                                                <table className="w-full text-[9px] mb-1">
                                                    <thead className="border-b border-slate-200">
                                                        <tr>
                                                            <th className="text-center py-0.5 w-8">Cant</th>
                                                            <th className="text-left py-0.5">Descripción / Detalle</th>
                                                            <th className="text-right py-0.5 w-16">Subtotal</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {(pedido.articulos || []).map((art, i) => (
                                                            <tr key={i} className="border-b border-slate-100 border-dashed">
                                                                <td className="py-1 font-bold text-center align-top">{art.cantidad}</td>
                                                                <td className="py-1 align-top">
                                                                    <div className="truncate max-w-[150px] font-bold text-[10px]" title={art.nombre}>
                                                                        {art.nombre}
                                                                    </div>
                                                                    <div className="text-[8px] text-slate-500 mt-0.5 font-medium leading-tight">
                                                                        <span className="font-black text-slate-700">{art.sku}</span> | L: {art.listaAplicada || pedido.listaPrecio || 'N/D'} | {art.precio === art.precioCaja && art.precioCaja > 0 && art.precio !== art.precioUnd ? 'Caja' : 'Und'}
                                                                    </div>
                                                                </td>
                                                                <td className="py-1 text-right font-medium align-top">${Number(art.subtotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                                <div className="mt-auto pt-1 border-t border-slate-300 flex justify-between items-center font-black text-xs">
                                                    <span>TOTAL:</span>
                                                    <span>${Number(pedido.total || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white p-2 rounded-xl shadow-sm border border-slate-100 flex gap-2 overflow-x-auto">
                        <button onClick={() => setActiveTab('pedidos')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'pedidos' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <LayoutDashboard size={18} /> Pedidos Globales
                        </button>
                        <button onClick={() => setActiveTab('zonas')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'zonas' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <MapIcon size={18} /> Zonas (Mapa)
                        </button>
                        <button onClick={() => setActiveTab('catalogo')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'catalogo' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <Package size={18} /> Catálogo y Precios
                        </button>
                        <button onClick={() => setActiveTab('cartera')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'cartera' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <MapPin size={18} /> Rutas (Cartera)
                        </button>
                        <button onClick={() => setActiveTab('cxc')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'cxc' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <Wallet size={18} /> CXC (Deudas)
                        </button>
                        <button onClick={() => setActiveTab('usuarios')} className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap ${activeTab === 'usuarios' ? 'bg-blue-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                            <Users size={18} /> Usuarios
                        </button>
                    </div>

                    {activeTab === 'pedidos' && (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                            <div className="bg-slate-50 p-6 border-b border-slate-100 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4">
                                <div>
                                    <h3 className="font-black text-lg text-blue-900 flex items-center gap-3"><Receipt className="text-orange-500" /> Visor de Pedidos de Vendedores</h3>
                                    <div className="flex items-center gap-3 mt-2">
                                        <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold inline-block">{filteredPedidosAdmin.length} Registros</span>
                                        {selectedPedidos.length > 0 && (
                                            <button onClick={() => setShowBulkPrint(true)} className="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded-full text-xs font-bold transition-colors flex items-center gap-1 shadow-sm">
                                                <Printer size={12} /> Imprimir Seleccionados ({selectedPedidos.length})
                                            </button>
                                        )}
                                    </div>
                                </div>
                                <div className="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                                    <div className="relative flex-1 min-w-[200px]">
                                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                                        <input
                                            type="text" placeholder="Buscar cliente o vendedor..." value={searchPedidoAdmin} onChange={e => setSearchPedidoAdmin(e.target.value)}
                                            className="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 transition-all font-medium"
                                        />
                                    </div>
                                    <select
                                        value={filtroEstadoAdmin} onChange={e => setFiltroEstadoAdmin(e.target.value)}
                                        className="bg-white border border-slate-200 text-sm font-bold text-slate-700 rounded-lg px-2 py-2 outline-none cursor-pointer"
                                    >
                                        <option value="ALL">Todos los Estados</option>
                                        <option value="Pendiente">Pendientes</option>
                                        <option value="Aprobado">Aprobados</option>
                                        <option value="Rechazado">Rechazados</option>
                                    </select>
                                    <select
                                        value={filtroVendedorAdmin} onChange={e => setFiltroVendedorAdmin(e.target.value)}
                                        className="bg-white border border-slate-200 text-sm font-bold text-slate-700 rounded-lg px-2 py-2 outline-none cursor-pointer"
                                    >
                                        <option value="ALL">Todos los Vendedores</option>
                                        {vendedoresUnicos.map(v => <option key={v.id} value={v.id}>{v.nombre}</option>)}
                                    </select>
                                    <div className="flex items-center gap-2 bg-white border border-slate-200 p-1 rounded-lg">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase ml-1">Desde:</span>
                                        <input type="date" value={pedidoStartDateAdmin} onChange={e => setPedidoStartDateAdmin(e.target.value)} className="text-sm font-bold text-blue-900 bg-transparent outline-none cursor-pointer" />
                                    </div>
                                    <div className="flex items-center gap-2 bg-white border border-slate-200 p-1 rounded-lg">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase ml-1">Hasta:</span>
                                        <input type="date" value={pedidoEndDateAdmin} onChange={e => setPedidoEndDateAdmin(e.target.value)} className="text-sm font-bold text-blue-900 bg-transparent outline-none cursor-pointer" />
                                    </div>
                                    {(searchPedidoAdmin || pedidoStartDateAdmin || pedidoEndDateAdmin || filtroVendedorAdmin !== 'ALL' || filtroEstadoAdmin !== 'ALL') && (
                                        <button onClick={() => { setSearchPedidoAdmin(''); setPedidoStartDateAdmin(''); setPedidoEndDateAdmin(''); setFiltroVendedorAdmin('ALL'); setFiltroEstadoAdmin('ALL'); }} className="p-2 bg-red-50 text-red-500 hover:bg-red-100 rounded-lg transition-colors shadow-sm" title="Limpiar filtros"><X size={16} /></button>
                                    )}
                                </div>
                            </div>
                            <div className="overflow-x-auto min-h-[400px]">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-white text-slate-400 uppercase text-[10px] font-black tracking-wider border-b-2 border-slate-100">
                                        <tr>
                                            <th className="px-4 py-4 w-10 text-center">
                                                <input 
                                                    type="checkbox" 
                                                    checked={selectedPedidos.length > 0 && selectedPedidos.length === filteredPedidosAdmin.length}
                                                    onChange={(e) => {
                                                        if (e.target.checked) {
                                                            setSelectedPedidos(filteredPedidosAdmin.map(p => p.id));
                                                        } else {
                                                            setSelectedPedidos([]);
                                                        }
                                                    }}
                                                    className="w-4 h-4 cursor-pointer"
                                                />
                                            </th>
                                            <th className="px-6 py-4">Fecha / Hora</th>
                                            <th className="px-6 py-4">Vendedor</th>
                                            <th className="px-6 py-4">Cliente</th>
                                            <th className="px-6 py-4 text-center">Estado</th>
                                            <th className="px-6 py-4 text-right">Total ($)</th>
                                            <th className="px-6 py-4 text-center">Gestión</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {filteredPedidosAdmin.map((p) => {
                                            return (
                                                <tr key={p.id} className="hover:bg-blue-50/30 transition-colors">
                                                    <td className="px-4 py-4 text-center">
                                                        <input 
                                                            type="checkbox"
                                                            checked={selectedPedidos.includes(p.id)}
                                                            onChange={(e) => {
                                                                if (e.target.checked) {
                                                                    setSelectedPedidos([...selectedPedidos, p.id]);
                                                                } else {
                                                                    setSelectedPedidos(selectedPedidos.filter(id => id !== p.id));
                                                                }
                                                            }}
                                                            className="w-4 h-4 cursor-pointer"
                                                        />
                                                    </td>
                                                    <td className="px-6 py-4 text-slate-600">
                                                        <div className="font-bold">{safeFormatDate(p.fecha)}</div>
                                                        <div className="text-xs text-slate-400">{safeFormatTime(p.fecha)}</div>
                                                    </td>
                                                    <td className="px-6 py-4 font-bold text-slate-700 text-xs">{p.vendedorId} - {p.vendedorNombre}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-800 text-xs">{p.clienteNombre} <span className="block text-[10px] font-bold text-blue-500 mt-1 uppercase">{p.listaPrecio}</span></td>
                                                    <td className="px-6 py-4 text-center">
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${p.estado === 'Aprobado' ? 'bg-green-100 text-green-700' : p.estado === 'Rechazado' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>{p.estado || 'Pendiente'}</span>
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-black text-blue-900">${Number(p.total || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                                    <td className="px-6 py-4 text-center flex justify-center gap-2">
                                                        <button onClick={() => setManagingPedido(p)} className="text-blue-600 hover:text-white hover:bg-blue-600 p-2 bg-blue-50 rounded-lg transition-colors" title="Gestionar / Auditar"><Edit2 size={16} /></button>
                                                        <button onClick={() => openModal('deletePedido', p.id, 'Eliminar Pedido', '¿Eliminar este pedido del sistema?')} className="text-red-500 hover:text-white hover:bg-red-600 p-2 bg-red-50 rounded-lg transition-colors" title="Eliminar"><Trash2 size={16} /></button>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {filteredPedidosAdmin.length === 0 && (
                                            <tr><td colSpan="7" className="px-6 py-12 text-center text-slate-400 font-medium">No hay pedidos registrados en la plataforma.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {activeTab === 'zonas' && (
                        <AdminZonasMap pedidos={pedidos} users={users} currentUser={currentUser} />
                    )}

                    {activeTab === 'catalogo' && (
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                            <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-6">
                                <div>
                                    <h2 className="text-xl font-black text-blue-900 flex items-center gap-3"><Package className="text-orange-500" /> Catálogo y Lista de Precios</h2>
                                    <p className="text-slate-500 text-sm font-medium mt-1">Sincroniza los productos (Base) y los precios (Lista) localmente o desde GitHub.</p>
                                </div>
                                <div className="text-right hidden sm:block">
                                    <span className="font-black text-2xl text-slate-700">{catalog.length}</span> <span className="text-xs font-bold text-slate-400 uppercase">Artículos</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                {/* Zona 1: Productos */}
                                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-6 text-center hover:bg-blue-50/50 hover:border-blue-300 transition-all flex flex-col justify-between">
                                    <div>
                                        <Package className="mx-auto h-10 w-10 text-slate-400 mb-3" />
                                        <h3 className="text-base font-bold text-slate-700 mb-1">1. Base de Productos</h3>
                                        <p className="text-[11px] text-slate-500 mb-4 px-2">Columnas requeridas: <strong>SKU, Nombre, Marca</strong>.</p>
                                    </div>
                                    <div className="flex flex-col gap-2 mt-2 w-full">
                                        <input type="file" ref={catalogInputRef} onChange={e => handleFileUpload(e, 'catalog')} accept=".xlsx, .xls, .csv" className="hidden" />
                                        <button onClick={() => catalogInputRef.current.click()} disabled={isUploadingCatalog} className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white py-2.5 rounded-xl font-bold transition-all shadow-sm w-full">
                                            {isUploadingCatalog ? 'Procesando...' : 'Subir Archivo Local'}
                                        </button>

                                        <div className="w-full flex items-center gap-2 my-2">
                                            <hr className="flex-1 border-slate-200" /><span className="text-[10px] font-bold text-slate-400">O VÍA ENLACE</span><hr className="flex-1 border-slate-200" />
                                        </div>

                                        <input type="text" placeholder="Enlace de GitHub Raw..." value={catalogUrl} onChange={e => setCatalogUrl(e.target.value)} className="w-full border-2 border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 font-medium" />
                                        <button onClick={() => handleUrlUpload(catalogUrl, 'catalog')} disabled={isUploadingCatalog || !catalogUrl} className="bg-slate-800 hover:bg-slate-900 disabled:bg-slate-400 text-white py-2.5 rounded-xl font-bold transition-all shadow-sm w-full flex items-center justify-center gap-2">
                                            {isUploadingCatalog ? 'Procesando...' : <><LinkIcon size={16} /> Sincronizar URL</>}
                                        </button>

                                        <button onClick={handleDownloadPlantillaCatalogo} className="text-blue-600 hover:text-blue-800 text-xs font-bold flex items-center justify-center gap-1 mt-3 transition-colors">
                                            <Download size={14} /> Descargar Plantilla
                                        </button>
                                    </div>
                                </div>

                                {/* Zona 2: Precios */}
                                <div className="border-2 border-dashed border-slate-300 rounded-2xl p-6 text-center hover:bg-green-50/50 hover:border-green-300 transition-all flex flex-col justify-between">
                                    <div>
                                        <DollarSign className="mx-auto h-10 w-10 text-slate-400 mb-3" />
                                        <h3 className="text-base font-bold text-slate-700 mb-1">2. Lista de Precios</h3>
                                        <p className="text-[11px] text-slate-500 mb-3 px-2">Columnas requeridas: <strong>CODIGO, PRECIO CAJA, PRECIO UND, UND</strong>.</p>
                                        <input type="text" placeholder="Nombre de Lista (Ej: LISTA A)" value={nombreLista} onChange={e => setNombreLista(e.target.value)} className="w-full max-w-[200px] mx-auto mb-4 border-2 border-slate-200 rounded-lg p-2 text-sm text-center outline-none focus:border-green-500 font-bold block uppercase" />
                                    </div>
                                    <div className="flex flex-col gap-2 mt-2 w-full">
                                        <input type="file" ref={preciosInputRef} onChange={e => handleFileUpload(e, 'precios', nombreLista.trim().toUpperCase())} accept=".xlsx, .xls, .csv" className="hidden" />
                                        <button onClick={() => { if (!nombreLista.trim()) { openModal('alert', null, 'Error', 'Debes ingresar un nombre para la lista de precios.', true); return; } preciosInputRef.current.click(); }} disabled={isUploadingPrecios} className="bg-green-600 hover:bg-green-700 disabled:bg-slate-400 text-white py-2.5 rounded-xl font-bold transition-all shadow-sm w-full">
                                            {isUploadingPrecios ? 'Procesando...' : 'Subir Archivo Local'}
                                        </button>

                                        <div className="w-full flex items-center gap-2 my-2">
                                            <hr className="flex-1 border-slate-200" /><span className="text-[10px] font-bold text-slate-400">O VÍA ENLACE</span><hr className="flex-1 border-slate-200" />
                                        </div>

                                        <input type="text" placeholder="Enlace de GitHub Raw..." value={preciosUrl} onChange={e => setPreciosUrl(e.target.value)} className="w-full border-2 border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-green-500 font-medium" />
                                        <button onClick={() => { if (!nombreLista.trim()) { openModal('alert', null, 'Error', 'Debes ingresar un nombre para la lista de precios.', true); return; } handleUrlUpload(preciosUrl, 'precios', nombreLista.trim().toUpperCase()); }} disabled={isUploadingPrecios || !preciosUrl} className="bg-slate-800 hover:bg-slate-900 disabled:bg-slate-400 text-white py-2.5 rounded-xl font-bold transition-all shadow-sm w-full flex items-center justify-center gap-2">
                                            {isUploadingPrecios ? 'Procesando...' : <><LinkIcon size={16} /> Sincronizar URL</>}
                                        </button>

                                        <button onClick={handleDownloadPlantillaPrecios} className="text-green-600 hover:text-green-800 text-xs font-bold flex items-center justify-center gap-1 mt-3 transition-colors">
                                            <Download size={14} /> Descargar Plantilla
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="flex justify-between items-end mb-4 px-2 mt-8 border-t border-slate-100 pt-6">
                                <h3 className="font-bold text-slate-700">Vista Previa del Catálogo</h3>
                                <div className="flex items-center gap-2">
                                    <span className="text-xs font-bold text-slate-500 uppercase">Ver precios de:</span>
                                    <select
                                        value={adminPreviewLista || ''}
                                        onChange={e => setAdminPreviewLista(e.target.value)}
                                        className="bg-white border-2 border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold text-blue-900 outline-none cursor-pointer"
                                    >
                                        <option value="">(Sin precios)</option>
                                        {listasDisponibles.map(l => <option key={l} value={l}>{l}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="overflow-x-auto max-h-[400px]">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-wider sticky top-0 shadow-sm z-10">
                                        <tr>
                                            <th className="px-6 py-3">SKU / CÓDIGO</th>
                                            <th className="px-6 py-3">Nombre</th>
                                            <th className="px-6 py-3 text-center">UND</th>
                                            <th className="px-6 py-3 text-right">Precio Caja ($)</th>
                                            <th className="px-6 py-3 text-right">Precio Und ($)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {catalogWithAdminPrices.slice(0, 100).map(p => (
                                            <tr key={p.id || p.sku} className="hover:bg-slate-50">
                                                <td className="px-6 py-3 font-mono text-xs text-slate-500">{p.sku}</td>
                                                <td className="px-6 py-3 font-bold text-slate-800 text-[11px] truncate max-w-[200px]" title={p.nombre}>{p.nombre}</td>
                                                <td className="px-6 py-3 text-center font-bold text-slate-500">{p.und || '-'}</td>
                                                <td className="px-6 py-3 text-right">

                    {activeTab === 'cartera' && (

                            <div className="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center hover:bg-blue-50/50 hover:border-blue-300 transition-all flex flex-col justify-center items-center max-w-xl mx-auto">
                                <Upload className="mx-auto h-12 w-12 text-slate-400 mb-3" />

                                    <button onClick={() => handleUrlUpload(carteraUrl, 'cartera')} disabled={isUploadingCartera || !carteraUrl} className="bg-slate-800 hover:bg-slate-900 disabled:bg-slate-400 text-white w-full py-2.5 rounded-xl font-bold transition-all shadow-sm flex items-center justify-center gap-2">

                    )}

                    {activeTab === 'usuarios' && (

                            <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-6">

        };




        const ProgressBar = ({ current, target, label, colorClass = "bg-orange-500" }) => {
            const safeTarget = target > 0 ? target : 0;
            const percentage = safeTarget > 0 ? Math.min(Math.round((current / safeTarget) * 100), 100) : 100;
            return (
                <div className="mb-4">
                    <div className="flex justify-between text-sm mb-1 font-semibold text-slate-700">
                        <span>{label}</span><span>{safeTarget > 0 ? `${percentage}%` : 'Meta Pendiente'}</span>
                    </div>
                    <div className="w-full bg-slate-200 rounded-full h-3">
                        <div className={`${colorClass} h-3 rounded-full transition-all duration-500`} style={{ width: `${safeTarget > 0 ? percentage : 100}%` }}></div>
                    </div>
                    <div className="text-xs text-slate-500 mt-1 text-right font-medium">
                        {Number(current).toLocaleString(undefined, { maximumFractionDigits: 2 })} / {safeTarget > 0 ? Number(safeTarget).toLocaleString(undefined, { maximumFractionDigits: 2 }) : 'N/A'}
                    </div>
                </div>
            );
        };

        const MiniCardKPI = ({ title, value, subValue, icon: Icon, colorClass, percent }) => (
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 hover:shadow-md transition-shadow relative overflow-hidden">
                <div className={`p-3.5 rounded-xl shrink-0 z-10 ${colorClass}`}><Icon size={24} /></div>
                <div className="min-w-0 flex-1 z-10">
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">{title}</p>
                    <div className="flex items-center gap-2">
                        <h3 className="text-lg sm:text-xl font-black text-slate-800 break-words leading-tight">{value}</h3>
                        {percent !== null && percent !== undefined && (
                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${percent >= 100 ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                {percent.toFixed(1)}%
                            </span>
                        )}
                    </div>
                    {subValue && <p className="text-[11px] font-medium text-slate-400 mt-1">{subValue}</p>}
                </div>
                {percent !== null && percent !== undefined && (
                    <div className="absolute bottom-0 left-0 h-1 bg-slate-100 w-full">
                        <div 
                            className={`h-full transition-all duration-500 ${percent >= 100 ? 'bg-green-500' : 'bg-orange-400'}`} 
                            style={{ width: `${Math.min(percent, 100)}%` }}
                        ></div>
                    </div>
                )}
            </div>
        );

        const TopKPIsBar = ({ stats, meta }) => {
            const calcPct = (curr, target) => target > 0 ? (curr / target) * 100 : null;
            return (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-6">
                    <MiniCardKPI title="Ventas Totales" value={`$${stats.totalMonto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`} subValue={meta?.monto > 0 ? `Meta: $${meta.monto.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : "Sin Meta"} icon={DollarSign} colorClass="bg-blue-100 text-blue-700" percent={calcPct(stats.totalMonto, meta?.monto)} />
                    <MiniCardKPI title="Cajas Totales" value={stats.totalCajas.toLocaleString(undefined, { maximumFractionDigits: 2 })} subValue={meta?.cajas > 0 ? `Meta: ${meta.cajas.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : "Sin Meta"} icon={Box} colorClass="bg-yellow-100 text-yellow-700" percent={calcPct(stats.totalCajas, meta?.cajas)} />
                    <MiniCardKPI title="Unidades Totales" value={stats.totalUnidades.toLocaleString(undefined, { maximumFractionDigits: 2 })} subValue={meta?.unidades > 0 ? `Meta: ${meta.unidades.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : "Sin Meta"} icon={Package} colorClass="bg-orange-100 text-orange-700" percent={calcPct(stats.totalUnidades, meta?.unidades)} />
                    <MiniCardKPI title="Pedidos Totales" value={stats.totalPedidos?.toLocaleString() || "0"} subValue="Facturas emitidas" icon={ShoppingCart} colorClass="bg-emerald-100 text-emerald-700" />
                    <MiniCardKPI title="Clientes Activos" value={stats.activeClientsCount.toLocaleString()} subValue={meta?.clientes > 0 ? `Meta: ${meta.clientes.toLocaleString()}` : "Total con compra"} icon={Users} colorClass="bg-green-100 text-green-700" percent={calcPct(stats.activeClientsCount, meta?.clientes)} />
                    <MiniCardKPI title="Prod. Diferentes" value={stats.productos?.toLocaleString() || "0"} subValue="Variedad vendida" icon={Tag} colorClass="bg-purple-100 text-purple-700" />
                    <MiniCardKPI title="Precio Promedio" value={`$${(stats.precioPromedio || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`} subValue="USD por Unidad" icon={Calculator} colorClass="bg-indigo-100 text-indigo-700" />
                    <MiniCardKPI title="Ticket Promedio" value={`$${(stats.ticketPromedio || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`} subValue="USD por Pedido" icon={Receipt} colorClass="bg-rose-100 text-rose-700" />
                </div>
            );
        };

        // --- DASHBOARD INTELIGENCIA ARTIFICIAL ---
        const MarketSharePanel = ({ sales, users }) => {
            const [filtroGrupo, setFiltroGrupo] = useState('TODOS');
            const [filtroSubgrupo, setFiltroSubgrupo] = useState('TODOS');
            const [vistaActiva, setVistaActiva] = useState('grupo'); // 'grupo' | 'subgrupo'

            const fmtVE = (n) => Number(n || 0).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            // Filtrar solo ventas del mes actual
            const currentMonthStr = useMemo(() => getLatestMonthStr(sales), [sales]);

            const ventasFiltradas = useMemo(() => sales.filter(s =>
                s.source === 'currMonth' || (!s.source && s.fecha && String(s.fecha).startsWith(currentMonthStr))
            ), [sales, currentMonthStr]);

            // Obtener nombre de vendedor
            const getNombreVendedor = (sale) => {
                const user = users.find(u => normalizeId(u.id) === normalizeId(sale.idVendedor));
                return user ? user.nombre : (sale.vendedor || sale.idVendedor || 'Desconocido');
            };

            // Calcular market share por GRUPO
            const dataGrupos = useMemo(() => {
                const totalesPorGrupo = {};
                const vendedorPorGrupo = {};

                ventasFiltradas.forEach(s => {
                    const grupo = s.grupo || 'SIN GRUPO';
                    const nombre = getNombreVendedor(s);
                    const monto = s.monto || 0;

                    // Total del grupo
                    totalesPorGrupo[grupo] = (totalesPorGrupo[grupo] || 0) + monto;

                    // Por vendedor dentro del grupo
                    if (!vendedorPorGrupo[grupo]) vendedorPorGrupo[grupo] = {};
                    vendedorPorGrupo[grupo][nombre] = (vendedorPorGrupo[grupo][nombre] || 0) + monto;
                });

                const filas = [];
                Object.entries(vendedorPorGrupo).forEach(([grupo, vendedores]) => {
                    const totalGrupo = totalesPorGrupo[grupo] || 1;
                    Object.entries(vendedores)
                        .sort((a, b) => b[1] - a[1])
                        .forEach(([vendedor, monto]) => {
                            filas.push({ grupo, vendedor, monto, total: totalGrupo, pct: (monto / totalGrupo) * 100 });
                        });
                });
                return filas;
            }, [ventasFiltradas, users]);

            // Calcular market share por SUBGRUPO
            const dataSubgrupos = useMemo(() => {
                const totalesPorSub = {};
                const vendedorPorSub = {};

                ventasFiltradas.forEach(s => {
                    const sub = s.subgrupo || 'SIN SUBGRUPO';
                    const nombre = getNombreVendedor(s);
                    const monto = s.monto || 0;

                    totalesPorSub[sub] = (totalesPorSub[sub] || 0) + monto;

                    if (!vendedorPorSub[sub]) vendedorPorSub[sub] = {};
                    vendedorPorSub[sub][nombre] = (vendedorPorSub[sub][nombre] || 0) + monto;
                });

                const filas = [];
                Object.entries(vendedorPorSub).forEach(([subgrupo, vendedores]) => {
                    const totalSub = totalesPorSub[subgrupo] || 1;
                    Object.entries(vendedores)
                        .sort((a, b) => b[1] - a[1])
                        .forEach(([vendedor, monto]) => {
                            filas.push({ subgrupo, vendedor, monto, total: totalSub, pct: (monto / totalSub) * 100 });
                        });
                });
                return filas;
            }, [ventasFiltradas, users]);

            const gruposDisponibles = useMemo(() => ['TODOS', ...new Set(dataGrupos.map(d => d.grupo))], [dataGrupos]);
            const subgruposDisponibles = useMemo(() => ['TODOS', ...new Set(dataSubgrupos.map(d => d.subgrupo))], [dataSubgrupos]);

            const filasMostradas = vistaActiva === 'grupo'
                ? dataGrupos.filter(d => filtroGrupo === 'TODOS' || d.grupo === filtroGrupo)
                : dataSubgrupos.filter(d => filtroSubgrupo === 'TODOS' || d.subgrupo === filtroSubgrupo);

            const maxPct = filasMostradas.length > 0 ? Math.max(...filasMostradas.map(f => f.pct)) : 100;

            return (
                <div className="space-y-6 animate-fadeIn">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-indigo-800 to-violet-700 p-6 rounded-2xl shadow-lg text-white flex flex-wrap justify-between items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-black flex items-center gap-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                                Market Share de Ventas
                            </h2>
                            <p className="text-indigo-200 text-sm mt-1 font-medium">Participación de cada vendedor en las ventas del mes por categoría</p>
                        </div>
                        <span className="bg-white/10 border border-white/20 px-4 py-2 rounded-full text-xs font-black backdrop-blur-sm">{formatMonthStr(currentMonthStr)}</span>
                    </div>

                    {/* Controles */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex flex-wrap gap-4 items-center">
                        {/* Toggle vista */}
                        <div className="flex bg-slate-100 rounded-xl p-1 gap-1">

                            <button onClick={() => { setVistaActiva('subgrupo'); setFiltroSubgrupo('TODOS'); }} className={`px-5 py-2 rounded-lg font-bold text-sm transition-all ${vistaActiva === 'subgrupo' ? 'bg-violet-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-200'}`}>Por Subgrupo</button>
