
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMACA 360 — Ventas y Pedidos</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SheetJS (Excel) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- html2pdf (Para imprimir/descargar PDFs saltando restricciones de iframe) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Leaflet & Geoman (Para Mapas y Polígonos) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Clases especiales para imprimir el pedido */
        @media print {
            body {
                background-color: #ffffff !important;
                margin: 0;
                padding: 0;
            }

            .print-hide {
                display: none !important;
            }

            .print-scroll-reset {
                overflow: visible !important;
                max-height: none !important;
                height: auto !important;
            }

            .print-modal {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                background: white !important;
                box-shadow: none !important;
            }
        }

        .chart-bar {
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fix para z-index de Leaflet en el dashboard */
        .leaflet-container {
            z-index: 10 !important;
            border-radius: 0.75rem;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0?external=react",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
        }
    }
    </script>
</head>

<body class="bg-slate-50 antialiased text-slate-800">

    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useMemo, useRef, useEffect, useTransition, useDeferredValue } from 'react';
        import { createRoot } from 'react-dom/client';
        import { flushSync } from 'react-dom';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch, addDoc, updateDoc, serverTimestamp, query, orderBy, deleteField } from 'firebase/firestore';
        import {
            LayoutDashboard, Users, Upload, Package, Box, LogOut, CheckCircle2, AlertCircle,
            PlusCircle, Trash2, Save, UserPlus, Edit2, X, Filter, Tag, Receipt, ShoppingCart,
            Search, Lock, BookOpen, Download, CalendarDays, Plus, Minus, FileText, MapPin, DollarSign, Printer, Map as MapIcon, Crosshair, ChevronRight, Wallet, Link as LinkIcon, Clock
            , Target, TrendingUp, ChevronDown, ChevronUp, FileSpreadsheet, Settings, TableProperties, PieChart, BarChart3, Calculator, History, TrendingDown, Sparkles, BrainCircuit, Key, Github, HelpCircle, List, RefreshCw
        } from 'lucide-react';

        // --- CONFIGURACIÓN DE FIREBASE ---
        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyALPCEm5iF7wqTtmFV4CFG35fcMsHFOvGo",
            authDomain: "appcomaca.firebaseapp.com",
            projectId: "appcomaca",
            storageBucket: "appcomaca.firebasestorage.app",
            messagingSenderId: "131293773197",
            appId: "1:131293773197:web:5311f9cbae7c4b919e11c4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const envAppId = typeof __app_id !== 'undefined' ? __app_id : 'appcomaca';

        const getCollectionPath = (colName) => isCanvasEnv ? `artifacts/${envAppId}/public/data/${colName}` : colName;

        // --- FUNCIONES DE LIMPIEZA EXTREMA Y SEGURIDAD ---
        const normalizeId = (id) => {
            if (id === undefined || id === null) return "";
            const str = String(id).replace(/[^0-9A-Za-z]/g, '');
            return str.replace(/^0+(?=[1-9A-Za-z])/g, '') || str;
        };

        const normalizeName = (name) => {
            if (!name) return "";
            return String(name).toUpperCase().trim().replace(/\s+/g, ' ');
        };

        const parseNum = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return val;
            let str = String(val).trim().replace(/[^0-9.,-]/g, '');
            if (!str) return 0;
            if (!str.includes(',') && !str.includes('.')) return Number(str) || 0;
            const lastComma = str.lastIndexOf(',');
            const lastDot = str.lastIndexOf('.');
            if (lastComma !== -1 && lastDot !== -1) {
                if (lastComma > lastDot) str = str.replace(/\./g, '').replace(',', '.');
                else str = str.replace(/,/g, '');
            } else if (lastComma !== -1) {
                if (str.split(',').length > 2) str = str.replace(/,/g, '');
                else str = str.replace(',', '.');
            } else if (lastDot !== -1) {
                if (str.split('.').length > 2) str = str.replace(/\./g, '');
            }
            return Number(str) || 0;
        };

        const getLatestMonthStr = (salesArray) => {
            if (!salesArray || salesArray.length === 0) {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }
            let max = "";
            for (let i = 0; i < salesArray.length; i++) {
                if (salesArray[i].fecha) {
                    const ym = String(salesArray[i].fecha).substring(0, 7);
                    if (ym > max) max = ym;
                }
            }
            if (!max) {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }
            return max;
        };

        const getPreviousMonthStr = (currentYm) => {
            if (!currentYm) return "";
            let [y, m] = currentYm.split('-');
            let date = new Date(parseInt(y), parseInt(m) - 1, 1);
            date.setMonth(date.getMonth() - 1);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        };

        const formatMonthStr = (ym) => {
            if (!ym) return "";
            const [y, m] = ym.split('-');
            const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            return `${months[parseInt(m, 10) - 1]} ${y}`;
        };

        const DB_NAME = 'Comaca360Cache';
        const STORE_NAME = 'salesCacheStore';

        const getDB = () => {
            return new Promise((resolve, reject) => {
                try {
                    const request = indexedDB.open(DB_NAME, 1);
                    request.onupgradeneeded = (e) => {
                        e.target.result.createObjectStore(STORE_NAME);
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                } catch (e) {
                    reject(e);
                }
            });
        };

        const saveToCache = async (key, data) => {
            try {
                if (window.indexedDB) {
                    const idb = await getDB();
                    const tx = idb.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(data, key);
                } else {
                    localStorage.setItem(key, JSON.stringify(data));
                }
            } catch (error) {
                console.warn("No se pudo guardar en caché (Ignorando para continuar)", error);
            }
        };

        const loadFromCache = async (key) => {
            try {
                if (window.indexedDB) {
                    const idb = await getDB();
                    return await new Promise((resolve) => {
                        const tx = idb.transaction(STORE_NAME, 'readonly');
                        const req = tx.objectStore(STORE_NAME).get(key);
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => resolve(null);
                    });
                } else {
                    const val = localStorage.getItem(key);
                    return val ? JSON.parse(val) : null;
                }
            } catch (error) {
                console.warn("No se pudo cargar desde caché (Ignorando para continuar)", error);
                return null;
            }
        };

        const initialUsersDB = [
            { id: "admin1", nombre: "Admin Principal", rol: "admin", password: "admin" },
            { id: "sup1", nombre: "Supervisor Demo", rol: "gerente", password: "123" },
            { id: "052", nombre: "Vendedor Test", rol: "vendedor", supervisor: "sup1", password: "123" }
        ];


        // Escudo antimayúsculas, tildes, espacios y caracteres invisibles (BOM)
        const normalizeHeader = (key) => String(key).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, '');

        const getSafeVal = (row, possibleKeys) => {
            const rowKeys = Object.keys(row);
            for (let pk of possibleKeys) {
                const normPk = normalizeHeader(pk);
                const foundKey = rowKeys.find(rk => normalizeHeader(rk) === normPk);
                if (foundKey !== undefined) return row[foundKey];
            }
            return undefined;
        };

        const safeFormatDate = (dateStr) => {
            if (!dateStr) return 'N/D';
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? 'N/D' : d.toLocaleDateString();
        };

        const safeFormatTime = (dateStr) => {
            if (!dateStr) return 'N/D';
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? 'N/D' : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        };

        const safeGetTime = (dateStr) => {
            if (!dateStr) return 0;
            const d = new Date(dateStr);
            return isNaN(d.getTime()) ? 0 : d.getTime();
        };

        const chunkArray = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));

        const uploadInBatches = async (dataArray, colName, idField = null) => {
            const chunks = chunkArray(dataArray, 450);
            const batchPromises = chunks.map(chunk => {
                const batch = writeBatch(db);
                chunk.forEach(item => {
                    const docRef = idField && item[idField] ? doc(db, getCollectionPath(colName), String(item[idField])) : doc(collection(db, getCollectionPath(colName)));
                    batch.set(docRef, item);
                });
                return batch.commit();
            });
            await Promise.all(batchPromises);
        };

        // --- MODAL DE CONFIRMACIÓN ---
        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel, isLoading, isAlert }) => {
            if (!isOpen) return null;
            const isSuccess = title === 'Éxito';
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 animate-fadeIn print-hide">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={isLoading ? undefined : onCancel}></div>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative z-10 transform scale-100 transition-all border border-slate-100">
                        <div className="p-6">
                            <div className={`flex items-center gap-4 mb-4 ${isAlert && isSuccess ? 'text-green-600' : 'text-red-600'}`}>
                                <div className={`p-3 rounded-full border ${isAlert && isSuccess ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}`}>
                                    {isAlert && isSuccess ? <CheckCircle2 size={28} /> : <AlertCircle size={28} />}
                                </div>
                                <h3 className="text-xl font-black text-slate-800">{title}</h3>
                            </div>
                            <p className="text-slate-600 font-medium leading-relaxed">{message}</p>
                        </div>
                        <div className="p-5 bg-slate-50 flex justify-end gap-3 border-t border-slate-200">
                            {!isAlert && (
                                <button onClick={onCancel} disabled={isLoading} className="px-5 py-2.5 text-slate-600 font-bold hover:bg-slate-200 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Cancelar</button>
                            )}
                            <button onClick={isAlert ? onCancel : onConfirm} disabled={isLoading} className={`px-5 py-2.5 text-white font-bold rounded-xl transition-all shadow-md hover:shadow-lg disabled:opacity-75 disabled:cursor-not-allowed flex items-center gap-2 ${isAlert && isSuccess ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                {isLoading && <div className="w-4 h-4 border-2 border-white/50 border-t-white rounded-full animate-spin"></div>}
                                {isAlert ? 'Entendido' : (isLoading ? 'Procesando...' : 'Sí, Confirmar')}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };


        // --- MAPA DE ZONAS (NUEVO COMPONENTE ADMIN) ---
        const AdminZonasMap = ({ pedidos, users, currentUser }) => {
            const mapRef = useRef(null);
            const mapContainerRef = useRef(null);
            const markersLayerRef = useRef(null);

            const [selectedVendedor, setSelectedVendedor] = useState('ALL');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [filterToday, setFilterToday] = useState(false);
            const [stats, setStats] = useState({ totalVisibles: 0 });

            const vendedoresConGps = useMemo(() => {
                const mapIds = new Map();
                pedidos.forEach(p => {
                    if (p.ubicacion && p.ubicacion.lat && p.ubicacion.lng) {
                        const seller = users.find(u => u.id === p.vendedorId);
                        const isMyTeam = currentUser.rol === 'admin' || (seller && seller.supervisor === currentUser.id);

                        if (isMyTeam && !mapIds.has(p.vendedorId)) {
                            mapIds.set(p.vendedorId, p.vendedorNombre);
                        }
                    }
                });
                return Array.from(mapIds.entries()).map(([id, nombre]) => ({ id, nombre }));
            }, [pedidos, users, currentUser]);

            const validPedidos = useMemo(() => {
                const todayStr = new Date().toISOString().split('T')[0];
                return pedidos.filter(p => {
                    if (!p.ubicacion || !p.ubicacion.lat || !p.ubicacion.lng) return false;

                    const seller = users.find(u => u.id === p.vendedorId);
                    if (currentUser.rol === 'gerente' && (!seller || seller.supervisor !== currentUser.id)) return false;

                    if (selectedVendedor !== 'ALL' && p.vendedorId !== selectedVendedor) return false;

                    if (filterToday) {
                        if (!p.fecha || !String(p.fecha).startsWith(todayStr)) return false;
                    } else if (startDate || endDate) {
                        const orderDate = new Date(p.fecha);
                        if (isNaN(orderDate.getTime())) return false;
                        if (startDate) {
                            const start = new Date(startDate + 'T00:00:00');
                            if (orderDate < start) return false;
                        }
                        if (endDate) {
                            const end = new Date(endDate + 'T23:59:59');
                            if (orderDate > end) return false;
                        }
                    }
                    return true;
                });
            }, [pedidos, selectedVendedor, startDate, endDate, filterToday, users, currentUser]);

            const updateStats = () => {
                setStats({ totalVisibles: validPedidos.length });
            };

            useEffect(() => {
                if (!window.L || mapRef.current || !mapContainerRef.current) return;

                mapRef.current = window.L.map(mapContainerRef.current).setView([10.4806, -66.9036], 6);
                window.L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
                }).addTo(mapRef.current);

                markersLayerRef.current = window.L.layerGroup().addTo(mapRef.current);

                return () => {
                    if (mapRef.current) {
                        mapRef.current.remove();
                        mapRef.current = null;
                    }
                };
            }, []);

            useEffect(() => {
                if (!mapRef.current || !markersLayerRef.current) return;

                markersLayerRef.current.clearLayers();
                const bounds = [];

                validPedidos.forEach(p => {
                    const marker = window.L.marker([p.ubicacion.lat, p.ubicacion.lng]);
                    const popupContent = `
                        <div class="p-1">
                            <strong class="text-blue-900 block mb-1 text-sm">${p.clienteNombre}</strong>
                            <span class="text-xs text-slate-500 block">Vendedor: ${p.vendedorNombre}</span>
                            <span class="text-xs text-slate-500 block">Fecha: ${safeFormatDate(p.fecha)}</span>
                            <span class="text-xs text-slate-500 block">Total: $${p.total.toLocaleString(undefined, { minimumFractionDigits: 2 })}</span>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded uppercase mt-2 inline-block ${p.estado === 'Aprobado' ? 'bg-green-100 text-green-700' : p.estado === 'Rechazado' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}">${p.estado || 'Pendiente'}</span>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                    marker.addTo(markersLayerRef.current);
                    bounds.push([p.ubicacion.lat, p.ubicacion.lng]);
                });

                if (bounds.length > 0) {
                    mapRef.current.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
                }

                updateStats();
            }, [validPedidos]);

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col h-full min-h-[600px] relative z-0">
                    <div className="bg-slate-50 p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 z-20">
                        <div>
                            <h3 className="font-black text-lg text-blue-900 flex items-center gap-3"><MapIcon className="text-orange-500" /> Auditoría de Rutas GPS</h3>
                            <p className="text-xs text-slate-500 mt-1">Visualización de pedidos geolocalizados en el mapa.</p>
                        </div>

                        <div className="flex flex-wrap items-center gap-4 w-full md:w-auto">
                            <div className="flex flex-wrap items-center gap-2">
                                <div className="flex items-center gap-2 bg-white border border-slate-200 p-1.5 rounded-lg shadow-sm">
                                    <span className="text-[10px] font-bold text-slate-400 uppercase ml-2">Desde:</span>
                                    <input
                                        type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)}
                                        className="text-sm font-bold text-blue-900 bg-transparent outline-none cursor-pointer"
                                    />
                                </div>
                                <div className="flex items-center gap-2 bg-white border border-slate-200 p-1.5 rounded-lg shadow-sm">
                                    <span className="text-[10px] font-bold text-slate-400 uppercase ml-2">Hasta:</span>
                                    <input
                                        type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)}
                                        className="text-sm font-bold text-blue-900 bg-transparent outline-none cursor-pointer pr-2"
                                    />
                                </div>
                                {(startDate || endDate) && (
                                    <button onClick={() => { setStartDate(''); setEndDate(''); }} className="p-2 bg-red-50 text-red-500 hover:bg-red-100 rounded-lg transition-colors shadow-sm" title="Limpiar fechas"><X size={16} /></button>
                                )}
                            </div>

                            <div className="flex items-center gap-2 bg-white border border-slate-200 p-1.5 rounded-lg shadow-sm">
                                <span className="text-[10px] font-bold text-slate-400 uppercase ml-2">Filtrar:</span>
                                <select value={selectedVendedor} onChange={(e) => setSelectedVendedor(e.target.value)} className="text-sm font-bold text-blue-900 bg-transparent outline-none cursor-pointer pr-2">
                                    <option value="ALL">Todos los Vendedores</option>
                                    {vendedoresConGps.map(v => <option key={v.id} value={v.id}>{v.nombre}</option>)}
                                </select>
                            </div>
                            <button
                                onClick={() => setFilterToday(!filterToday)}
                                className={`px-4 py-2 rounded-xl text-sm font-bold transition-all shadow-sm flex items-center gap-2 ${filterToday ? 'bg-orange-500 text-white' : 'bg-white text-slate-600 border-2 border-slate-200'}`}
                            >
                                <Clock size={16} /> Ver pedidos de hoy
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row relative z-10">
                        <div className="flex-1 h-[400px] lg:h-auto bg-slate-100 relative z-10">
                            <div ref={mapContainerRef} className="absolute inset-0"></div>
                        </div>
                        <div className="w-full lg:w-72 bg-white border-t lg:border-t-0 lg:border-l border-slate-200 p-6 flex flex-col z-20">
                            <h4 className="font-black text-slate-800 uppercase text-xs tracking-widest mb-6 border-b border-slate-100 pb-2">Información</h4>
                            <div className="space-y-6">
                                <div>
                                    <p className="text-sm font-bold text-slate-500 flex items-center gap-2 mb-1"><MapPin size={16} /> Puntos Mostrados</p>
                                    <p className="text-3xl font-black text-blue-900">{stats.totalVisibles}</p>
                                    <p className="text-xs text-slate-400">Pedidos totales geolocalizados de la selección actual.</p>
                                </div>
                            </div>
                            <div className="mt-auto pt-6">
                                <p className="text-[10px] text-slate-400 font-medium text-center">Solo se muestran los pedidos que el vendedor guardó con permisos de GPS activos.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // --- VISTA DE GESTIÓN Y APROBACIÓN DE PEDIDO (ADMIN) ---
        const GestorPedidoModal = ({ pedido, precios, cxc, onClose, db, getCollectionPath, openModal }) => {
            const listasDisponibles = useMemo(() => [...new Set(precios.map(p => p.lista).filter(Boolean))], [precios]);
            const [selectedLista, setSelectedLista] = useState(pedido.listaPrecio || '');
            const [articulos, setArticulos] = useState(pedido.articulos || []);
            const [isSaving, setIsSaving] = useState(false);
            const [isPrinting, setIsPrinting] = useState(false);
            const [showFacturas, setShowFacturas] = useState(false);

            const clientDebtData = useMemo(() => {
                if (!cxc || cxc.length === 0) return null;
                return cxc.find(d => 
                    d.rawCliente === pedido.clienteNombre || 
                    d.clienteNombre === pedido.clienteNombre || 
                    (d.idCliente && pedido.clienteNombre.includes(d.idCliente)) ||
                    (pedido.clienteId && d.idCliente === pedido.clienteId)
                );
            }, [cxc, pedido]);

            const handleListaChange = (e) => {
                const newLista = e.target.value;
                setSelectedLista(newLista);

                const newArticulos = pedido.articulos.map(item => {
                    const priceItem = precios.find(p => p.sku === item.sku && p.lista === newLista);
                    const newPrice = priceItem ? priceItem.precio : 0;
                    return { ...item, precio: newPrice, subtotal: newPrice * item.cantidad };
                });

                setArticulos(newArticulos);
            };

            const total = articulos.reduce((acc, item) => acc + (item.subtotal || 0), 0);
            const hasZeroPrice = articulos.some(item => !item.precio || item.precio <= 0);

            const handleUpdate = async (nuevoEstado) => {
                setIsSaving(true);
                try {
                    await updateDoc(doc(db, getCollectionPath('pedidos'), pedido.id), {
                        estado: nuevoEstado,
                        listaPrecio: selectedLista,
                        articulos: articulos,
                        total: total
                    });
                    openModal('alert', null, 'Éxito', `El pedido se actualizó a estado: ${nuevoEstado}.`, true);
                    onClose();
                } catch (e) {
                    console.error(e);
                    openModal('alert', null, 'Error', 'Ocurrió un error al actualizar el pedido.', true);
                }
                setIsSaving(false);
            };

            const handlePrint = () => {
                if (!window.html2pdf) {
                    openModal('alert', null, 'Error', 'El módulo de impresión aún se está cargando. Intenta de nuevo en unos segundos.', true);
                    return;
                }
                setIsPrinting(true);

                const element = document.getElementById('ticket-to-print');
                const cleanName = (pedido.clienteNombre || 'Pedido').replace(/[^a-z0-9]/gi, '_');

                const opt = {
                    margin: 0.5,
                    filename: `Pedido_${cleanName}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };

                window.html2pdf().set(opt).from(element).save().then(() => {
                    setIsPrinting(false);
                }).catch(err => {
                    console.error(err);
                    setIsPrinting(false);
                    openModal('alert', null, 'Error', 'No se pudo generar el PDF.', true);
                });
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm print-modal">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col print-scroll-reset">

                        <div className="p-6 border-b border-slate-200 flex justify-between items-center shrink-0 bg-white rounded-t-2xl print-hide">
                            <h2 className="text-xl font-black text-blue-900 flex items-center gap-2"><FileText className="text-orange-500" /> Gestión de Pedido</h2>
                            <button onClick={onClose} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 transition-colors"><X size={20} /></button>
                        </div>

                        <div className="shrink-0 bg-slate-50 border-b border-slate-200 print-hide">
                            {pedido.estado === 'Pendiente' && (
                                <div className="p-5 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <div>
                                        <p className="text-sm font-bold text-blue-900 mb-1">Lista de Precios Aplicada</p>
                                        <p className="text-xs text-blue-700">Puedes cambiar la lista; los precios se recalcularán automáticamente.</p>
                                    </div>
                                    <select
                                        value={selectedLista}
                                        onChange={handleListaChange}
                                        className="bg-white border-2 border-blue-200 focus:border-blue-500 text-sm font-bold text-blue-900 rounded-lg px-4 py-2 outline-none cursor-pointer shadow-sm"
                                    >
                                        <option value="" disabled>Selecciona una lista</option>
                                        {listasDisponibles.map(l => <option key={l} value={l}>{l}</option>)}
                                    </select>
                                </div>
                            )}
                            {hasZeroPrice && (
                                <div className="p-4 mx-5 my-2 bg-red-50 border border-red-200 rounded-xl flex items-center gap-3 text-red-600">
                                    <AlertCircle size={24} className="shrink-0" />
                                    <div>
                                        <p className="text-sm font-black">¡Atención! Hay artículos sin precio en esta lista.</p>
                                        <p className="text-xs font-medium">Asigna una lista válida o no podrás aprobar el pedido.</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div id="ticket-to-print" className="p-8 flex-1 overflow-y-auto bg-white print-scroll-reset">
                            <div className="border-b-2 border-slate-800 pb-6 mb-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start mb-6 gap-4">
                                    <div>
                                        <h1 className="text-3xl font-black text-slate-800 tracking-tighter">COMACA <span className="text-orange-500">360</span></h1>
                                        <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mt-1">Orden de Pedido</p>
                                    </div>
                                    <div className="text-left sm:text-right">
                                        <p className="text-sm font-bold text-slate-800">Fecha: {safeFormatDate(pedido.fecha)}</p>
                                        <p className="text-sm text-slate-500">Hora: {safeFormatTime(pedido.fecha)}</p>
                                        <p className="text-sm font-bold mt-2">Estado: <span className={`uppercase ${pedido.estado === 'Aprobado' ? 'text-green-600' : pedido.estado === 'Rechazado' ? 'text-red-600' : 'text-yellow-600'}`}>{pedido.estado || 'Pendiente'}</span></p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-5 rounded-xl border border-slate-100">
                                    <div>
                                        <p className="text-xs text-slate-400 font-bold uppercase mb-1">Datos del Cliente</p>
                                        <p className="font-black text-slate-800 text-lg leading-tight">{pedido.clienteNombre || 'Sin Nombre'}</p>
                                        <p className="text-sm text-slate-500 mt-1 font-mono">ID: {pedido.clienteId || 'N/A'}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-400 font-bold uppercase mb-1">Datos del Vendedor</p>
                                        <p className="font-bold text-slate-800 text-base leading-tight">{pedido.vendedorNombre || 'Sin Nombre'}</p>
                                        <p className="text-sm text-slate-500 mt-1 font-mono">Ruta / ID: {pedido.vendedorId || 'N/A'}</p>
                                    </div>
                                </div>

                                {pedido.ubicacion && (
                                    <div className="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-xl print-hide">
                                        <p className="text-xs text-blue-800 font-bold uppercase mb-1 flex items-center gap-1"><MapPin size={14} /> Ubicación del Pedido (GPS)</p>
                                        <a href={`https://www.google.com/maps?q=${pedido.ubicacion.lat},${pedido.ubicacion.lng}`} target="_blank" rel="noopener noreferrer" className="text-sm font-bold text-blue-600 hover:text-blue-800 hover:underline">
                                            Ver en Google Maps ({pedido.ubicacion.lat.toFixed(5)}, {pedido.ubicacion.lng.toFixed(5)})
                                        </a>
                                    </div>
                                )}
                            </div>

                            {clientDebtData && clientDebtData.deuda > 0 && (
                                <div className="mb-6 bg-red-50 border border-red-200 rounded-xl p-4 print-hide">
                                    <div className="flex items-center flex-wrap gap-3">
                                        <div className="bg-red-100 p-2 rounded-full text-red-600"><AlertCircle size={20} /></div>
                                        <div>
                                            <p className="text-sm font-black text-red-800 uppercase tracking-wide">¡ATENCIÓN! Este cliente tiene un saldo pendiente de ${clientDebtData.deuda.toLocaleString(undefined, { minimumFractionDigits: 2 })}</p>
                                        </div>
                                        <button onClick={() => setShowFacturas(!showFacturas)} className="ml-auto bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors shadow-sm">
                                            {showFacturas ? 'Ocultar Facturas' : 'Ver Facturas'}
                                        </button>
                                    </div>
                                    
                                    {showFacturas && clientDebtData.facturas && clientDebtData.facturas.length > 0 && (
                                        <div className="mt-4 border-t border-red-200 pt-4">
                                            <table className="w-full text-left text-xs">
                                                <thead className="text-red-800 uppercase font-bold border-b border-red-200">
                                                    <tr>
                                                        <th className="py-2 px-2">Documento</th>
                                                        <th className="py-2 px-2">Fecha</th>
                                                        <th className="py-2 px-2 text-right">Monto Original</th>
                                                        <th className="py-2 px-2 text-right">Saldo Pendiente</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-red-100">
                                                    {clientDebtData.facturas.map((fac, idx) => (
                                                        <tr key={idx} className="hover:bg-red-100/50">
                                                            <td className="py-2 px-2 font-mono text-red-900">{fac.numero}</td>
                                                            <td className="py-2 px-2 text-red-700">{fac.fecha}</td>
                                                            <td className="py-2 px-2 text-right text-red-700">${Number(fac.monto).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                                            <td className="py-2 px-2 text-right font-black text-red-600">${Number(fac.saldo).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            )}

                            <table className="w-full text-sm text-left mb-6">
                                <thead className="border-b-2 border-slate-200 text-slate-500 uppercase text-[10px] font-black tracking-wider">
                                    <tr>
                                        <th className="py-3 px-2">SKU</th>
                                        <th className="py-3 px-2">Descripción</th>
                                        <th className="py-3 px-2 text-center">Cant</th>
                                        <th className="py-3 px-2 text-right">Precio Unit.</th>
                                        <th className="py-3 px-2 text-right">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {articulos.map((item, idx) => (
                                        <tr key={idx}>
                                            <td className="py-3 px-2 font-mono text-xs text-slate-500">{item.sku}</td>
                                            <td className="py-3 px-2 font-bold text-slate-800">{item.nombre}</td>
                                            <td className="py-3 px-2 text-center font-black text-slate-600">{item.cantidad || 0}</td>
                                            <td className="py-3 px-2 text-right font-medium text-slate-600">
                                                {item.precio > 0 ? `$${Number(item.precio || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}` : <span className="text-red-500 font-bold">N/D</span>}
                                            </td>
                                            <td className="py-3 px-2 text-right font-black text-slate-800">
                                                ${Number(item.subtotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                                <tfoot className="border-t-2 border-slate-800 bg-white">
                                    <tr>
                                        <td colSpan="3"></td>
                                        <td className="py-4 px-2 text-right text-sm font-bold text-slate-500 uppercase">Total Pedido:</td>
                                        <td className="py-4 px-2 text-right text-2xl font-black text-orange-600">${Number(total || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        <div className="p-6 bg-white border-t border-slate-200 flex flex-wrap justify-between items-center gap-4 shrink-0 rounded-b-2xl print-hide">
                            <button onClick={handlePrint} disabled={isPrinting} className="px-6 py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl flex items-center gap-2 transition-all shadow-sm disabled:opacity-50">
                                {isPrinting ? <div className="w-5 h-5 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <Printer size={18} />}
                                {isPrinting ? 'Generando PDF...' : 'Descargar PDF (Ticket)'}
                            </button>

                            <div className="flex gap-3">
                                {pedido.estado !== 'Rechazado' && (
                                    <button onClick={() => handleUpdate('Rechazado')} disabled={isSaving || isPrinting} className="px-6 py-3 bg-white border-2 border-red-200 hover:border-red-400 hover:bg-red-50 text-red-600 font-bold rounded-xl transition-all disabled:opacity-50">
                                        Rechazar Pedido
                                    </button>
                                )}
                                {pedido.estado !== 'Aprobado' && (
                                    <button onClick={() => handleUpdate('Aprobado')} disabled={isSaving || isPrinting || hasZeroPrice || !selectedLista} className="px-8 py-3 bg-green-600 hover:bg-green-700 text-white font-black rounded-xl shadow-md transition-all flex items-center gap-2 disabled:opacity-50">
                                        {isSaving ? <div className="w-5 h-5 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <CheckCircle2 size={20} />}
                                        Aprobar Pedido
                                    </button>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        };


        // --- VISTA DE TOMA DE PEDIDOS (VENDEDOR) ---
        const TomaPedidosView = ({ currentUser, client, goBack, catalog, precios, cxc, openModal }) => {
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedMarca, setSelectedMarca] = useState('Todas');
            const [cart, setCart] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState('Confirmar y Enviar Pedido');

            const [isCartMobileOpen, setIsCartMobileOpen] = useState(false);
            const [observacion, setObservacion] = useState('');
            const [showDebtDetail, setShowDebtDetail] = useState(false);

            const [itemLists, setItemLists] = useState({});

            const listasDisponibles = useMemo(() => [...new Set(precios.map(p => p.lista).filter(Boolean))], [precios]);

            // Determinar listas que este usuario puede ver
            const listasPermitidas = useMemo(() => {
                const isAdminOrGerente = currentUser.rol === 'admin' || currentUser.rol === 'gerente';
                if (isAdminOrGerente) return listasDisponibles; // Admin/Gerente ven todo
                const visibles = currentUser.listasVisibles;
                if (visibles && visibles.length > 0) {
                    return listasDisponibles.filter(l => visibles.includes(l));
                }
                return listasDisponibles; // Si no tiene restricción, ve todas
            }, [listasDisponibles, currentUser]);

            // Lista base del usuario (lista que se asigna por defecto a los items)
            const listaBaseDefault = useMemo(() => {
                if (currentUser.listaBase && listasPermitidas.includes(currentUser.listaBase)) {
                    return currentUser.listaBase;
                }
                return listasPermitidas.length > 0 ? listasPermitidas[0] : '';
            }, [currentUser.listaBase, listasPermitidas]);

            useEffect(() => {
                if (listaBaseDefault) {
                    setItemLists(prev => {
                        if (Object.keys(prev).length === 0) {
                            const initial = {};
                            catalog.forEach(p => initial[p.sku] = listaBaseDefault);
                            return initial;
                        }
                        return prev;
                    });
                }
            }, [catalog, listaBaseDefault]);

            const handleListChange = (sku, newList) => {
                setItemLists(prev => ({ ...prev, [sku]: newList }));
                
                setCart(prev => {
                    const existing = prev.find(item => item.sku === sku);
                    if (existing) {
                        const priceItem = precios.find(p => p.sku === sku && p.lista === newList);
                        const newPrice = priceItem ? priceItem.precio : 0;
                        return prev.map(item => item.sku === sku ? { 
                            ...item, 
                            precio: newPrice, 
                            listaAplicada: newList, 
                            subtotal: item.cantidad * newPrice,
                            precioCaja: priceItem ? priceItem.precioCaja : 0,
                            precioUnd: priceItem ? priceItem.precioUnd : 0,
                            und: priceItem ? priceItem.und : 0
                        } : item);
                    }
                    return prev;
                });
            };

            const catalogWithSelectedPrices = useMemo(() => {
                return catalog.map(prod => {
                    const assignedList = itemLists[prod.sku] || listaBaseDefault;
                    const priceItem = precios.find(p => p.sku === prod.sku && p.lista === assignedList);
                    return {
                        ...prod,
                        listaAplicada: assignedList,
                        precio: priceItem ? priceItem.precio : 0,
                        precioCaja: priceItem ? priceItem.precioCaja : 0,
                        precioUnd: priceItem ? priceItem.precioUnd : 0,
                        und: priceItem ? priceItem.und : 0
                    };
                });
            }, [catalog, precios, itemLists, listasDisponibles]);

            const marcas = useMemo(() => {
                const m = new Set(catalogWithSelectedPrices.map(p => p.marca));
                return ['Todas', ...Array.from(m).sort()];
            }, [catalogWithSelectedPrices]);

            const filteredCatalog = useMemo(() => {
                let filtered = catalogWithSelectedPrices;
                if (selectedMarca !== 'Todas') filtered = filtered.filter(p => p.marca === selectedMarca);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(p => p.nombre.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
                }
                return filtered;
            }, [catalogWithSelectedPrices, searchQuery, selectedMarca]);

            const updateCart = (product, change) => {
                if (!product.precio || product.precio <= 0) return;
                setCart(prev => {
                    const existing = prev.find(item => item.sku === product.sku);
                    if (existing) {
                        const newQty = existing.cantidad + change;
                        if (newQty <= 0) return prev.filter(item => item.sku !== product.sku);
                        return prev.map(item => item.sku === product.sku ? { ...item, cantidad: newQty, subtotal: newQty * item.precio } : item);
                    } else if (change > 0) {
                        return [...prev, { ...product, cantidad: 1, subtotal: product.precio }];
                    }
                    return prev;
                });
            };

            const handleSetQty = (product, val) => {
                if (!product.precio || product.precio <= 0) return;
                const qty = parseInt(val, 10);
                if (isNaN(qty) || qty <= 0) {
                    setCart(prev => prev.filter(item => item.sku !== product.sku));
                } else {
                    setCart(prev => {
                        const existing = prev.find(item => item.sku === product.sku);
                        if (existing) return prev.map(item => item.sku === product.sku ? { ...item, cantidad: qty, subtotal: qty * item.precio } : item);
                        return [...prev, { ...product, cantidad: qty, subtotal: qty * product.precio }];
                    });
                }
            };

            const cartTotal = cart.reduce((acc, item) => acc + (item.subtotal || 0), 0);
            const cartTotalQty = cart.reduce((acc, item) => acc + (item.cantidad || 0), 0);

            const submitOrder = async () => {
                if (cart.length === 0) return;
                setIsSubmitting(true);
                setSubmitStatus('Obteniendo Ubicación GPS...');

                let ubicacion = null;
                try {
                    if (!('geolocation' in navigator)) {
                        throw new Error('Geolocalización no soportada.');
                    }
                    ubicacion = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(
                            position => resolve({ lat: position.coords.latitude, lng: position.coords.longitude }),
                            error => reject(error),
                            { timeout: 10000, enableHighAccuracy: true }
                        );
                    });
                } catch (err) {
                    console.warn("No se pudo obtener la geolocalización", err);
                    openModal('alert', null, 'Error', 'Es necesario activar el GPS para registrar el pedido.', true);
                    setIsSubmitting(false);
                    setSubmitStatus('Confirmar y Enviar Pedido');
                    return;
                }

                setSubmitStatus('Guardando Pedido...');

                try {
                    const pedido = {
                        vendedorId: currentUser.id,
                        vendedorNombre: currentUser.nombre,
                        clienteId: client.idCliente || client.firebaseId || "S/N",
                        clienteNombre: client.cliente,
                        listaPrecio: 'Múltiple',
                        fecha: new Date().toISOString(),
                        estado: 'Pendiente',
                        total: cartTotal,
                        totalItems: cartTotalQty,
                        articulos: cart,
                        ubicacion: ubicacion,
                        observacion: observacion
                    };

                    await addDoc(collection(db, getCollectionPath('pedidos')), pedido);
                    openModal('alert', null, 'Éxito', 'El pedido ha sido registrado y enviado al administrador exitosamente.', true);
                    goBack();
                } catch (err) {
                    console.error("Error al guardar pedido", err);
                    openModal('alert', null, 'Error', 'Ocurrió un problema al enviar el pedido. Verifica tu conexión.', true);
                } finally {
                    setIsSubmitting(false);
                    setSubmitStatus('Confirmar y Enviar Pedido');
                }
            };

            return (
                <div className="animate-fadeIn h-full flex flex-col bg-slate-50 relative">

                    {client.deuda > 0 && (
                        <div className="bg-red-50 border-b border-red-200 px-4 py-2 flex items-center flex-wrap gap-2 text-red-700 print-hide z-10 relative">
                            <AlertCircle size={16} className="shrink-0" />
                            <span className="text-xs font-bold uppercase tracking-wide">El cliente presenta una deuda vencida de:</span>
                            <span className="text-sm font-black">${client.deuda.toLocaleString(undefined, { minimumFractionDigits: 2 })}</span>
                            <button onClick={() => setShowDebtDetail(true)} className="ml-auto bg-red-100 hover:bg-red-200 text-red-800 text-[10px] font-black px-3 py-1 rounded-full transition-colors uppercase">
                                Ver Detalle de Deuda
                            </button>
                        </div>
                    )}

                    <div className="bg-white p-4 shadow-sm border-b border-slate-200 flex items-center justify-between sticky top-0 z-20">
                        <div className="flex items-center gap-4">
                            <button onClick={goBack} className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors"><X size={20} /></button>
                            <div>
                                <h2 className="text-xl font-black text-blue-900 leading-tight">Tomar Pedido</h2>
                                <p className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1"><MapPin size={12} /> {client.cliente}</p>
                                <div className="flex items-center gap-2 mt-1">
                                    <span className="text-[10px] font-bold text-slate-400 uppercase">Listas por producto</span>
                                </div>
                            </div>
                        </div>

                        {/* Botón Carrito Móvil (Cabecera) */}
                        <button 
                            onClick={() => setIsCartMobileOpen(true)}
                            className="lg:hidden relative p-2 bg-blue-50 text-blue-900 rounded-xl"
                        >
                            <ShoppingCart size={24} />
                            {cart.length > 0 && (
                                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-md">
                                    {cart.length}
                                </span>
                            )}
                        </button>
                        <div className="text-right hidden lg:block">
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-wider">Total Acumulado</p>
                            <p className="text-2xl font-black text-orange-600">${Number(cartTotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</p>
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden flex-col lg:flex-row relative">
                        {/* CATÁLOGO (IZQUIERDA) */}
                        <div className="flex-1 flex flex-col overflow-hidden bg-slate-50 relative lg:border-r border-slate-200 pb-20 lg:pb-0">
                            <div className="p-4 bg-white border-b border-slate-200 z-10 shadow-sm">
                                <div className="flex flex-col sm:flex-row gap-3">
                                    <div className="relative flex-1">
                                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input
                                            type="text" placeholder="Buscar por nombre o SKU..."
                                            value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                            className="w-full pl-10 pr-4 py-2.5 bg-slate-100 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-xl text-sm outline-none transition-all font-medium"
                                        />
                                    </div>
                                    <select
                                        value={selectedMarca} onChange={e => setSelectedMarca(e.target.value)}
                                        className="bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-700 outline-none transition-all cursor-pointer"
                                    >
                                        {marcas.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 pb-32">
                                <div className="flex flex-col gap-2">
                                    {filteredCatalog.map(prod => {
                                        const cartItem = cart.find(i => i.sku === prod.sku);
                                        const qty = cartItem ? cartItem.cantidad : 0;
                                        const hasPrice = prod.precio && prod.precio > 0;
                                        const isSelected = qty > 0;

                                        return (
                                            <div key={prod.sku} className={`bg-white rounded-xl border-2 p-3 flex items-center justify-between gap-4 transition-all ${isSelected ? 'border-blue-500 bg-blue-50/50 shadow-md' : 'border-slate-100 hover:border-slate-300 shadow-sm'}`}>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        {isSelected && <CheckCircle2 size={16} className="text-blue-600 shrink-0" />}
                                                        <span className="text-[10px] font-black uppercase tracking-wider bg-slate-200 text-slate-600 px-2 py-0.5 rounded">{prod.marca}</span>
                                                        <span className="text-[10px] font-bold text-slate-400">SKU: {prod.sku}</span>
                                                    </div>
                                                    <h4 className={`font-bold text-sm leading-tight truncate ${isSelected ? 'text-blue-900' : 'text-slate-800'}`} title={prod.nombre}>{prod.nombre}</h4>

                                                    <div className="mt-1 flex items-center gap-2">
                                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Lista:</span>
                                                        <select
                                                            value={prod.listaAplicada}
                                                            onChange={(e) => handleListChange(prod.sku, e.target.value)}
                                                            className="bg-slate-100 border border-slate-200 text-[10px] font-bold text-blue-900 rounded px-1 py-0.5 outline-none cursor-pointer"
                                                        >
                                                            {listasPermitidas.map(l => <option key={l} value={l}>{l}</option>)}
                                                        </select>
                                                    </div>

                                                    {hasPrice ? (
                                                        <div className="mt-1 flex flex-wrap items-center gap-x-3 gap-y-1">
                                                            <p className="text-sm font-black text-blue-900">${Number(prod.precio || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} <span className="text-[10px] text-slate-500 font-bold">c/u</span></p>
                                                            {prod.precioCaja > 0 && <p className="text-[10px] font-bold text-slate-500">Caja: ${Number(prod.precioCaja || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ({prod.und} und)</p>}
                                                        </div>
                                                    ) : (
                                                        <p className="text-xs font-bold text-red-500 mt-1 flex items-center gap-1"><AlertCircle size={12} /> Sin Precio</p>
                                                    )}
                                                </div>

                                                <div className="shrink-0 w-32 flex justify-end">
                                                    {!hasPrice ? (
                                                        <span className="text-xs font-bold text-slate-400 uppercase bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">N/D</span>
                                                    ) : !isSelected ? (
                                                        <button onClick={() => updateCart(prod, 1)} className="w-full py-2 bg-slate-100 text-slate-600 hover:bg-blue-600 hover:text-white hover:border-blue-600 font-bold rounded-lg transition-colors flex items-center justify-center gap-1 text-sm border border-slate-200 shadow-sm">
                                                            <Plus size={16} /> Agregar
                                                        </button>
                                                    ) : (
                                                        <div className="flex items-center justify-between w-full bg-white rounded-lg overflow-hidden border-2 border-blue-500 shadow-inner">
                                                            <button onClick={() => updateCart(prod, -1)} className="p-2 text-blue-600 hover:bg-blue-100 transition-colors bg-blue-50"><Minus size={16} /></button>
                                                            <input
                                                                type="number" value={qty} onChange={(e) => handleSetQty(prod, e.target.value)}
                                                                className="w-10 text-center font-black text-sm bg-transparent border-none outline-none text-blue-900 appearance-none p-0"
                                                            />
                                                            <button onClick={() => updateCart(prod, 1)} className="p-2 text-blue-600 hover:bg-blue-100 transition-colors bg-blue-50"><Plus size={16} /></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                                {filteredCatalog.length === 0 && (
                                    <div className="text-center p-12 text-slate-400">
                                        <Package size={48} className="mx-auto mb-4 opacity-50" />
                                        <p className="font-medium">No se encontraron productos.</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* BARRA INFERIOR FIJA PARA MÓVILES (Solo visible si hay ítems y el modal está cerrado) */}
                        {!isCartMobileOpen && cart.length > 0 && (
                            <div
                                onClick={() => setIsCartMobileOpen(true)}
                                className="lg:hidden fixed bottom-0 left-0 w-full z-40 bg-gradient-to-r from-blue-900 to-blue-800 text-white rounded-t-3xl pb-8 pt-4 px-6 flex justify-between items-center cursor-pointer animate-fadeIn shadow-[0_-10px_25px_-5px_rgba(30,58,138,0.4)] border-t border-blue-700"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="relative p-2 bg-blue-800 rounded-xl border border-blue-700">
                                        <ShoppingCart size={24} className="text-orange-400" />
                                        <span className="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-sm">{cart.length}</span>
                                    </div>
                                    <div>
                                        <p className="text-sm font-black leading-tight">Ver Resumen</p>
                                        <p className="text-xs text-blue-200 font-medium">{cartTotalQty} ítems agregados</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-lg font-black text-orange-400">${Number(cartTotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</p>
                                </div>
                            </div>
                        )}

                        {/* CARRITO (MODAL EN MÓVIL / BARRA LATERAL EN ESCRITORIO) */}
                        <div className={`fixed inset-0 z-50 bg-white flex flex-col lg:static lg:w-[450px] lg:shadow-[-10px_0_15px_-5px_rgba(0,0,0,0.05)] shrink-0 transition-transform duration-300 ${isCartMobileOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'}`}>

                            <div className="lg:hidden bg-slate-800 text-white p-5 flex justify-between items-center shrink-0 shadow-md z-10">
                                <div>
                                    <h3 className="font-black text-lg flex items-center gap-2"><ShoppingCart size={22} className="text-orange-400" /> Resumen del Pedido</h3>
                                    <p className="text-xs text-slate-300 mt-1 flex items-center gap-1"><Users size={12} /> {client.cliente}</p>
                                </div>
                                <button onClick={() => setIsCartMobileOpen(false)} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-full transition-colors"><X size={20} /></button>
                            </div>

                            <div className="hidden lg:flex bg-slate-800 text-white p-4 justify-between items-center shrink-0">
                                <h3 className="font-black flex items-center gap-2"><ShoppingCart size={20} className="text-orange-400" /> Resumen</h3>
                                <span className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold">{cart.length} SKU ({cartTotalQty} un)</span>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 bg-slate-50/50">
                                {cart.length === 0 ? (
                                    <div className="h-full flex flex-col justify-center items-center text-slate-400 text-center">
                                        <ShoppingCart size={40} className="mb-3 opacity-30" />
                                        <p className="text-sm font-medium">El carrito está vacío.</p>
                                        <p className="text-xs mt-1">Agrega productos para procesar el pedido.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {cart.map(item => (
                                            <div key={item.sku} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex gap-3 relative group">
                                                <button onClick={() => updateCart(item, -item.cantidad)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 hover:bg-red-600 hover:text-white rounded-full p-1 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-all shadow-sm z-10">
                                                    <X size={12} />
                                                </button>
                                                <div className="flex-1">
                                                    <p className="text-xs font-bold text-slate-800 leading-tight pr-4">{item.nombre}</p>
                                                    <p className="text-[10px] text-slate-400 mt-1">${Number(item.precio || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })} c/u</p>
                                                </div>
                                                <div className="text-right flex flex-col items-end justify-between">
                                                    <span className="font-black text-blue-900">${Number(item.subtotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}</span>
                                                    <div className="flex items-center gap-2 bg-slate-100 rounded-lg px-2 py-1 mt-1">
                                                        <button onClick={() => updateCart(item, -1)} className="text-slate-500 hover:text-blue-600"><Minus size={12} /></button>
                                                        <span className="text-xs font-bold w-6 text-center">{item.cantidad}</span>
                                                        <button onClick={() => updateCart(item, 1)} className="text-slate-500 hover:text-blue-600"><Plus size={12} /></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {cart.length > 0 && (
                                    <div className="mt-4 bg-white border border-slate-100 rounded-xl p-4 shadow-sm relative">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-2 tracking-wider flex items-center gap-1"><FileText size={12} /> Observación del Pedido</label>
                                        <textarea
                                            value={observacion}
                                            onChange={(e) => setObservacion(e.target.value)}
                                            placeholder="Ej. Entregar después de las 2pm..."
                                            className="w-full bg-slate-50/50 border border-slate-200 rounded-lg p-3 text-sm outline-none focus:border-blue-500 focus:bg-white resize-none h-16 transition-all"
                                        ></textarea>
                                    </div>
                                )}
                            </div>

                            <div className="p-4 bg-white border-t border-slate-200 shrink-0 shadow-[0_-10px_15px_-5px_rgba(0,0,0,0.05)] lg:shadow-none z-10">
                                <div className="flex justify-between items-center gap-4">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Pedido</span>
                                        <span className="text-xl lg:text-2xl font-black text-orange-600 leading-tight">${Number(cartTotal || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                                    </div>
                                    
                                    <button
                                        onClick={submitOrder}
                                        disabled={cart.length === 0 || isSubmitting}
                                        className="flex-1 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:text-slate-500 text-white font-black py-3.5 px-4 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-sm max-w-[200px]"
                                    >
                                        {isSubmitting ? <div className="w-5 h-5 border-2 border-white/50 border-t-white rounded-full animate-spin"></div> : <CheckCircle2 size={18} />}
                                        <span className="truncate">{submitStatus}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    {showDebtDetail && (
                        <div className="absolute inset-0 z-50 bg-slate-900/50 flex items-center justify-center p-4 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[80vh]">
                                <div className="p-4 bg-red-600 text-white flex justify-between items-center shrink-0">
                                    <div className="flex items-center gap-2">
                                        <Wallet size={20} />
                                        <h3 className="font-black text-lg">Detalle de Deuda</h3>
                                    </div>
                                    <button onClick={() => setShowDebtDetail(false)} className="text-red-100 hover:text-white transition-colors">
                                        <X size={24} />
                                    </button>
                                </div>
                                <div className="p-5 overflow-y-auto flex-1">
                                    <p className="text-xs font-bold text-slate-500 uppercase mb-4 text-center">Facturas Pendientes: {client.cliente}</p>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left border border-slate-200 rounded-lg overflow-hidden">
                                            <thead className="bg-slate-100 text-slate-600 text-[11px] uppercase">
                                                <tr>
                                                    <th className="px-4 py-2 font-bold">Documento</th>
                                                    <th className="px-4 py-2 font-bold">Fecha</th>
                                                    <th className="px-4 py-2 text-right font-bold">Monto Orig.</th>
                                                    <th className="px-4 py-2 text-right font-bold text-red-600">Saldo</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {(() => {
                                                    const clientCxc = cxc?.find(d => d.rawCliente === client.cliente || d.clienteNombre === client.cliente || (d.idCliente && client.cliente.includes(d.idCliente)));
                                                    if (!clientCxc || !clientCxc.facturas || clientCxc.facturas.length === 0) {
                                                        return <tr><td colSpan="4" className="px-4 py-6 text-center text-slate-400">No hay detalles de facturas.</td></tr>;
                                                    }
                                                    return clientCxc.facturas.map((fac, idx) => (
